<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deepfake Detector - Chabot STEM 2026</title>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#F0F4F8;min-height:100vh}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pop{0%{transform:scale(0.85);opacity:0}60%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(230,92,60,0.45)}50%{box-shadow:0 0 0 8px rgba(230,92,60,0)}}
    .fade-in{animation:fadeIn .3s ease-out}
    .slide-up{animation:slideUp .4s ease-out}
    .pop{animation:pop .35s ease-out}
    .shake{animation:shake .3s ease-out}
    .flag{display:inline;cursor:pointer;padding:1px 4px;border-radius:4px;border:1px dashed transparent;transition:all .15s}
    .flag:hover{border-color:#D4A843;background:rgba(212,168,67,0.12)}
    .flag.found{background:rgba(39,174,96,0.18);border:1px solid #27AE60;color:#1B6E3A;font-weight:600}
    .artifact-zone{position:absolute;cursor:pointer;border-radius:50%;transition:all .2s}
    .artifact-zone:hover{background:rgba(212,168,67,0.18)}
    .artifact-zone.found{background:rgba(39,174,96,0.20);border:2px solid #27AE60}
    .artifact-zone.wrong{background:rgba(192,57,43,0.20);border:2px solid #C0392B;animation:shake .3s ease-out}
  </style>
</head>
<body>
  <div id="root"></div>

    <polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity=".85"/>
    <polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity=".85"/>
    <polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity=".85"/>

    </div>

  const AppFooter=()=>(<div style={{textAlign:"center",padding:"14px 20px",borderTop:`3px solid ${GOLD}`,background:WHITE,fontSize:11,color:"#999",display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:24}}>

  function ImageCard({img, onComplete}) {
    const [foundIds, setFoundIds] = useState([]);
    const [wrongClicks, setWrongClicks] = useState(0);
    const [feedback, setFeedback] = useState(null);
    const [done, setDone] = useState(false);

    const totalArtifacts = img.artifacts.length;
    const allFound = foundIds.length === totalArtifacts;

    const click = (kind, item) => {
      if (done) return;
      if (kind === "artifact") {
        if (!foundIds.includes(item.id)) {
          setFoundIds([...foundIds, item.id]);
          setFeedback({type: "good", text: item.label + ". " + item.explain});
        }
      } else {
        setWrongClicks(wrongClicks + 1);
        setFeedback({type: "bad", text: item.why || "Nothing wrong here."});
      }
    };

    const finish = () => {
      setDone(true);
      const score = foundIds.length - Math.floor(wrongClicks * 0.5);
      onComplete({total: totalArtifacts, found: foundIds.length, wrong: wrongClicks, score: Math.max(0, score), isRealCase: img.isReal});
    };

    return (
      <div className="slide-up">
        <Card>
          <SectionLabel>Image {img.id} of {IMAGES.length}</SectionLabel>
          <div style={{fontSize:15,fontWeight:800,color:NAVY,marginBottom:4}}>{img.title}</div>
          <p style={{fontSize:12,color:MED,marginBottom:12,fontStyle:"italic"}}>{img.caption}</p>

          {/* Embedded photograph with clickable artifact zones */}
          <div style={{position:"relative",width:"100%",maxWidth:500,margin:"0 auto",aspectRatio:"4/3",background:"#1a1a1a",borderRadius:10,overflow:"hidden",border:"2px solid "+NAVY}}>
            {/* Real embedded photograph */}
            <img src={img.src} alt={img.title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"contain",background:"#1a1a1a"}}/>
            {/* Artifact zones */}
            {img.artifacts.map(a => (
              <div key={a.id} className={"artifact-zone " + (foundIds.includes(a.id) ? "found" : "")}
                onClick={() => click("artifact", a)}
                style={{left:a.x+"%", top:a.y+"%", width:48, height:48, transform:"translate(-50%,-50%)"}}>
              </div>
            ))}
            {/* Decoy zones */}
            {img.decoys.map((d, i) => (
              <div key={"d"+i} className="artifact-zone"
                onClick={() => click("decoy", d)}
                style={{left:d.x+"%", top:d.y+"%", width:48, height:48, transform:"translate(-50%,-50%)"}}>
              </div>
            ))}
            {/* Found counter */}
            <div style={{position:"absolute",top:8,right:10,background:"rgba(0,0,0,0.6)",color:"#0ABAB5",fontFamily:"Courier New, monospace",fontSize:13,fontWeight:700,padding:"4px 10px",borderRadius:6,textShadow:"0 0 6px rgba(10,186,181,0.6)"}}>
              {img.isReal ? "REAL? CLICK 'CONFIRM REAL' BELOW" : `${foundIds.length}/${totalArtifacts} FOUND`}
            </div>
          </div>

          {feedback && (
            <div className="fade-in" style={{marginTop:12,padding:"10px 14px",background:feedback.type==="good"?"#E8F8F1":"#FFF5F5",borderLeft:`4px solid ${feedback.type==="good"?GREEN:RED}`,borderRadius:8,fontSize:13,color:DARK,lineHeight:1.5}}>
              {feedback.text}
            </div>
          )}

          <div style={{display:"flex",gap:8,marginTop:12,flexWrap:"wrap"}}>
            {!img.isReal && (
              <Btn primary onClick={finish}>{allFound ? "All Found - Continue →" : `Submit (${foundIds.length}/${totalArtifacts})`}</Btn>
            )}
            {img.isReal && (
              <Btn primary onClick={() => { setFeedback({type:"good",text:"Correct! This was a real photo. Trusting your eye instead of over-triaging is half the skill."}); setTimeout(finish, 600); }}>Confirm Real Photo</Btn>
            )}
          </div>
          <div style={{marginTop:10,fontSize:11,color:MED}}>Wrong clicks: {wrongClicks}</div>
        </Card>
      </div>
    );
  }

  function SpotMode({onBack}) {
    const [idx, setIdx] = useState(0);
    const [results, setResults] = useState([]);
    const [done, setDone] = useState(false);

    const handleComplete = (r) => {
      const next = [...results, r];
      setResults(next);
      if (idx + 1 >= IMAGES.length) {
        setDone(true);
      } else {
        setTimeout(() => setIdx(idx + 1), 800);
      }
    };

    if (done) {
      const totalScore = results.reduce((s,r) => s + r.score, 0);
      const totalFound = results.reduce((s,r) => s + r.found, 0);
      const totalArtifacts = results.reduce((s,r) => s + r.total, 0);
      const totalWrong = results.reduce((s,r) => s + r.wrong, 0);
      return (<div className="fade-in">
        <Card style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>🎭</div>
          <div style={{fontSize:32,fontWeight:800,color:NAVY,lineHeight:1}}>{totalFound} / {totalArtifacts}</div>
          <div style={{fontSize:13,color:MED,margin:"8px 0"}}>Real artifacts found</div>
          <div style={{fontSize:13,color:MED,marginBottom:14}}>Wrong clicks (false positives): {totalWrong}</div>
          <div style={{padding:"12px 14px",background:"#FFF9E6",borderLeft:`4px solid ${GOLD}`,borderRadius:10,marginBottom:14,fontSize:13,fontStyle:"italic",color:DARK,lineHeight:1.6,textAlign:"left"}}>
            <strong>Field Pearl:</strong> {randomPearl()}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn primary onClick={() => { setIdx(0); setResults([]); setDone(false); }}>Try Again</Btn>
            <Btn onClick={onBack}>Menu</Btn>
          </div>
        </Card>
      </div>);
    }

    return (<div>
      <ImageCard key={idx} img={IMAGES[idx]} onComplete={handleComplete}/>
    </div>);
  }

  // ===== Mode 2: Voice Analyzer =====
  const VOICE_SAMPLES = [
    {
      id: 1,

      tells: [
        "Volume stays unnaturally consistent — no drop at sentence ends",
        "No breathing pause between 'accounts payable' and 'Can you'",

      ],
      isAI: true,

    {

      tells: [

      tells: [

      ],
      isAI: true,

    },
    {
      id: 4,
      label: "Voice clip D: '[laughter] Oh my god, you would NOT BELIEVE what happened today. So I'm at the store and—'",
      tells: [
        "Genuine laughter (AI struggles to produce real laughter)",
        "Mid-sentence interruption mid-thought",
        "Spontaneous emphasis on 'NOT BELIEVE'",
      ],
      isAI: false,
      explain: "Real human. Spontaneous laughter and mid-sentence pivots are hard for AI to fake convincingly.",

  function VoiceMode({onBack}) {
    const [idx, setIdx] = useState(0);
    const [picks, setPicks] = useState([]);
    const [feedback, setFeedback] = useState(null);

    const pick = (guessIsAI) => {
      const sample = VOICE_SAMPLES[idx];
      const correct = guessIsAI === sample.isAI;
      setFeedback({correct, sample});
      setPicks([...picks, correct]);
    };

    const next = () => {
      setFeedback(null);
      if (idx + 1 < VOICE_SAMPLES.length) setIdx(idx + 1);
      else setIdx(VOICE_SAMPLES.length); // done state
    };

    if (idx >= VOICE_SAMPLES.length) {
      const score = picks.filter(p => p).length;
      return (<div className="fade-in">
        <Card style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>🔊</div>
          <div style={{fontSize:32,fontWeight:800,color:NAVY}}>{score} / {VOICE_SAMPLES.length}</div>
          <div style={{fontSize:13,color:MED,margin:"8px 0 14px"}}>Correct voice IDs</div>
          <div style={{padding:"12px 14px",background:"#FFF9E6",borderLeft:`4px solid ${GOLD}`,borderRadius:10,marginBottom:14,fontSize:13,fontStyle:"italic",color:DARK,lineHeight:1.6,textAlign:"left"}}>
            <strong>Field Pearl:</strong> {randomPearl()}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>

    const sample = VOICE_SAMPLES[idx];

      <Card className="slide-up">
        <SectionLabel>Voice clip {idx+1} of {VOICE_SAMPLES.length}</SectionLabel>
        <div style={{padding:"14px 16px",background:"#0a0a0a",borderRadius:10,marginBottom:14,position:"relative"}}>
          {/* Stylized waveform */}
          <svg viewBox="0 0 200 30" style={{width:"100%",height:30,marginBottom:8}}>
            {Array.from({length:40}).map((_,i) => {
              const h = sample.isAI ? 8 + Math.sin(i*0.4)*3 : 4 + Math.random()*16;
              return <rect key={i} x={i*5} y={(30-h)/2} width="3" height={h} fill="#0ABAB5"/>;

        <div style={{fontSize:12,color:MED,marginBottom:10,fontStyle:"italic"}}>Listen to the patterns above. Pick one:</div>
        {!feedback && (
          <div style={{display:"flex",gap:10}}>
            <Btn onClick={() => pick(false)} style={{flex:1}}>Real Human</Btn>
            <Btn onClick={() => pick(true)} style={{flex:1}}>AI Generated</Btn>
          </div>
        )}
        {feedback && (
          <div className="fade-in" style={{marginTop:12}}>
            <div style={{padding:"10px 14px",background:feedback.correct?"#E8F8F1":"#FFF5F5",borderLeft:`4px solid ${feedback.correct?GREEN:RED}`,borderRadius:8,fontSize:13,color:DARK,lineHeight:1.5,marginBottom:8}}>
              <strong>{feedback.correct ? "✓ Correct!" : "✗ Other way around."}</strong>{" "}{feedback.sample.explain}
            </div>
            <div style={{padding:"10px 14px",background:"#F8F9FA",borderRadius:8,fontSize:12,color:MED,lineHeight:1.5}}>
              <strong style={{color:NAVY}}>Tells:</strong>
              <ul style={{marginTop:6,paddingLeft:18}}>
                {feedback.sample.tells.map((t,i) => <li key={i}>{t}</li>)}
              </ul>
            </div>
            <div style={{textAlign:"right",marginTop:10}}>
              <Btn primary onClick={next}>{idx + 1 < VOICE_SAMPLES.length ? "Next →" : "Results"}</Btn>
            </div>
          </div>
        )}
      </Card>
    </div>);
  }

  // ===== Mode 3: Source Verification Chain =====
  const STAGES = [
    {
      stage: 1,
      title: "Stage 1: AI Generation",
      desc: "An AI image is generated by a free online tool. The metadata of who made it is buried in code.",
      options: [
        {text:"Reverse image search", correct:false, why:"Won't help yet — the image hasn't been uploaded anywhere yet, so there's nothing to search against."},
        {text:"Inspect EXIF metadata", correct:true, why:"Yes — many AI tools embed a 'Generated by [tool]' tag in EXIF or the file's SynthID watermark. First-line defense."},
        {text:"Run through Reality Defender", correct:true, why:"Reality Defender, Sensity, and Truepic are real tools that score images for AI-generation likelihood. Industry standard."},
      ],
    },
    {
      stage: 2,
      title: "Stage 2: Posted on Social Media",
      desc: "Someone uploads the AI image to TikTok or X. EXIF gets stripped automatically.",
      options: [
        {text:"Check EXIF metadata", correct:false, why:"EXIF is gone — social platforms strip it on upload. This trick no longer works at this stage."},
        {text:"Reverse image search", correct:true, why:"Yes — Google Images and TinEye can find earlier copies of the same image, including the original AI source if it leaked."},
        {text:"Look at uploader account history", correct:true, why:"Account credibility matters. New accounts, low followers, or spam-pattern posting are red flags."},
      ],
    },
    {
      stage: 3,
      title: "Stage 3: Reposted with 'BREAKING' Headline",
      desc: "The image now has a viral caption like 'BREAKING: [politician] caught doing [shocking thing]!'",
      options: [
        {text:"Check the original news source", correct:true, why:"Yes — if mainstream outlets aren't reporting it, it's likely fake. Real breaking news shows up in 3+ credible sources within an hour."},
        {text:"Trust because lots of people are sharing", correct:false, why:"Virality is not credibility. Many fakes go viral specifically BECAUSE they're outrageous."},
        {text:"Ask: 'Who benefits if I believe this?'", correct:true, why:"This is the strongest defense against ANY misinformation. Follow the incentive."},
      ],
    },
    {
      stage: 4,
      title: "Stage 4: Mainstream News Picks It Up",
      desc: "A real news outlet runs the story without verification. Now the fake is 'real news'.",
      options: [
        {text:"Wait 24 hours for retractions", correct:true, why:"Legitimate outlets retract within 24 hours when caught. The fact-check trail emerges fast."},
        {text:"Assume it's true now that it's on the news", correct:false, why:"News outlets get duped too. They just have to retract publicly when caught — but the damage is done."},
        {text:"Check fact-checking sites (Snopes, AP Fact Check)", correct:true, why:"Yes — fact-checkers move fast on viral content. Within hours of a story breaking, there's usually a verdict."},
      ],
    },
  ];

  function ChainMode({onBack}) {
    const [stageIdx, setStageIdx] = useState(0);
    const [picks, setPicks] = useState({});

    const togglePick = (optIdx) => {
      const key = stageIdx + "-" + optIdx;
      setPicks({...picks, [key]: !picks[key]});
    };

    const stage = STAGES[stageIdx];
    const stageDone = Object.keys(picks).filter(k => k.startsWith(stageIdx + "-") && picks[k]).length > 0;

    const nextStage = () => {
      if (stageIdx + 1 < STAGES.length) setStageIdx(stageIdx + 1);
      else setStageIdx(STAGES.length);
    };

    if (stageIdx >= STAGES.length) {
      let correct = 0, total = 0;
      STAGES.forEach((s, si) => {
        s.options.forEach((o, oi) => {
          total++;
          const picked = picks[si + "-" + oi];
          if (o.correct === !!picked) correct++;
        });
      });
      return (<div className="fade-in">
        <Card style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>🔍</div>
          <div style={{fontSize:32,fontWeight:800,color:NAVY}}>{correct} / {total}</div>
          <div style={{fontSize:13,color:MED,margin:"8px 0 14px"}}>Correct verification picks</div>
          <div style={{padding:"12px 14px",background:"#FFF9E6",borderLeft:`4px solid ${GOLD}`,borderRadius:10,marginBottom:14,fontSize:13,fontStyle:"italic",color:DARK,lineHeight:1.6,textAlign:"left"}}>
            <strong>Field Pearl:</strong> {randomPearl()}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn primary onClick={() => {setStageIdx(0); setPicks({});}}>Try Again</Btn>
            <Btn onClick={onBack}>Menu</Btn>
          </div>
        </Card>
      </div>);
    }

    return (<div>
      <Card className="slide-up">
        <SectionLabel>{stage.title}</SectionLabel>
        <p style={{fontSize:14,color:DARK,lineHeight:1.6,marginBottom:14}}>{stage.desc}</p>
        <div style={{fontSize:12,color:MED,fontWeight:600,marginBottom:8}}>Pick ALL verification steps that work at this stage:</div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {stage.options.map((o, oi) => {
            const key = stageIdx + "-" + oi;
            const isPicked = !!picks[key];
            return (<div key={oi} onClick={() => togglePick(oi)} style={{padding:"12px 14px",border:`2px solid ${isPicked?TEAL:"#E0E8EE"}`,borderRadius:10,cursor:"pointer",background:isPicked?"#F0FBF8":WHITE,transition:"all .2s"}}>
              <div style={{fontSize:13,fontWeight:700,color:isPicked?TEAL_DARK:DARK,marginBottom:isPicked?6:0}}>
                <input type="checkbox" checked={isPicked} readOnly style={{marginRight:8,accentColor:TEAL}}/>{o.text}
              </div>
              {isPicked && (<div className="fade-in" style={{fontSize:12,color:o.correct?GREEN:RED,fontWeight:600,marginLeft:24}}>
                {o.correct ? "✓ " : "✗ "}{o.why}
              </div>)}
            </div>);
          })}
        </div>
        <div style={{textAlign:"right",marginTop:14}}>
          <Btn primary onClick={nextStage}>{stageIdx + 1 < STAGES.length ? "Next Stage →" : "View Results"}</Btn>
        </div>
      </Card>
    </div>);
  }

  // ===== Mode 4: Detect Fakes Practice =====
  // Northwestern Kellogg Detect Fakes methodology: per image -> Real or AI? -> Confidence Low/Med/High -> Evidence checklist -> Reveal -> Summary
  // Reuses IMAGES[] from Spot mode. The 8th image (isReal=true) is the trap real photo.

  const EVIDENCE_OPTIONS = [
    {id:"face",  label:"Face looks too smooth"},
    {id:"eyes",  label:"Eyes or blinking seem strange"},
    {id:"voice", label:"Voice or audio mismatched (skip for image)"},
    {id:"lips",  label:"Lips do not match audio (skip for image)"},
    {id:"light", label:"Lighting or shadows seem wrong"},
    {id:"bg",    label:"Background looks blurry or distorted"},
    {id:"hands", label:"Hands, fingers, teeth or text look unusual"},
    {id:"src",   label:"Source or context seems suspicious"},
    {id:"none",  label:"No clear evidence"},
  ];

  // Confidence rank: Low=1, Medium=2, High=3
  const CONF_RANK = {Low:1, Medium:2, High:3};

  function DetectFakesMode({onBack}) {
    const [idx, setIdx] = useState(0);
    const [judge, setJudge] = useState(null);    // "Real" | "AI" | "NotSure"
    const [conf, setConf] = useState(null);      // "Low" | "Medium" | "High"
    const [evidence, setEvidence] = useState([]);
    const [revealed, setRevealed] = useState(false);
    const [results, setResults] = useState([]);
    const [done, setDone] = useState(false);

    const img = IMAGES[idx];

    const toggleEvidence = (id) => {
      if (revealed) return;
      // "none" is exclusive
      if (id === "none") {
        setEvidence(evidence.includes("none") ? [] : ["none"]);
      } else {
        const without = evidence.filter(e => e !== "none");
        if (without.includes(id)) setEvidence(without.filter(e => e !== id));
        else setEvidence([...without, id]);
      }
    };

    const submit = () => {
      if (!judge || !conf) return;
      setRevealed(true);
    };

    const advance = () => {
      const correct = (judge === "Real" && img.isReal) || (judge === "AI" && !img.isReal);
      const next = [...results, {imgId: img.id, judge, conf, evidence, correct, isReal: img.isReal}];
      setResults(next);
      if (idx + 1 >= IMAGES.length) {
        setDone(true);
      } else {
        setIdx(idx + 1);
        setJudge(null);
        setConf(null);
        setEvidence([]);
        setRevealed(false);
      }
    };

    const reset = () => {
      setIdx(0); setJudge(null); setConf(null); setEvidence([]);
      setRevealed(false); setResults([]); setDone(false);
    };

    if (done) {
      const correctCount = results.filter(r => r.correct).length;
      const correctConfs = results.filter(r => r.correct).map(r => CONF_RANK[r.conf]);
      const wrongConfs   = results.filter(r => !r.correct).map(r => CONF_RANK[r.conf]);
      const avg = (arr) => arr.length ? (arr.reduce((s,n)=>s+n,0)/arr.length) : 0;
      const labelFromAvg = (a) => a >= 2.34 ? "High" : a >= 1.67 ? "Medium" : a > 0 ? "Low" : "-";
      const avgCorrect = labelFromAvg(avg(correctConfs));
      const avgWrong   = labelFromAvg(avg(wrongConfs));
      const dangerous  = results.filter(r => !r.correct && r.conf === "High").length;

      return (<div className="fade-in">
        <Card style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>🧪</div>
          <div style={{fontSize:32,fontWeight:800,color:NAVY,lineHeight:1}}>{correctCount} / {IMAGES.length}</div>
          <div style={{fontSize:13,color:MED,margin:"8px 0"}}>Images correctly identified</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"14px 0",textAlign:"left"}}>
            <div style={{padding:"10px 12px",background:"#E8F8F1",border:`2px solid ${GREEN}33`,borderRadius:10}}>
              <div style={{fontSize:11,fontWeight:700,color:GREEN,textTransform:"uppercase",letterSpacing:1}}>When Right</div>
              <div style={{fontSize:18,fontWeight:800,color:NAVY,marginTop:4}}>Avg conf: {avgCorrect}</div>
            </div>
            <div style={{padding:"10px 12px",background:"#FFF5F5",border:`2px solid ${RED}33`,borderRadius:10}}>
              <div style={{fontSize:11,fontWeight:700,color:RED,textTransform:"uppercase",letterSpacing:1}}>When Wrong</div>
              <div style={{fontSize:18,fontWeight:800,color:NAVY,marginTop:4}}>Avg conf: {avgWrong}</div>
            </div>
          </div>
          <div style={{padding:"12px 14px",background:"#FFF9E6",borderLeft:`4px solid ${GOLD}`,borderRadius:10,marginBottom:14,fontSize:13,color:DARK,lineHeight:1.6,textAlign:"left"}}>
            <strong>Confidence calibration is the meta-skill.</strong> High confidence + wrong answer is the riskiest combination ({dangerous} of yours). The Northwestern Kellogg researchers track exactly this metric, because over-confident humans are easier to fool than under-confident ones.
          </div>
          <div style={{padding:"12px 14px",background:"#F0FBF8",borderLeft:`4px solid ${TEAL}`,borderRadius:10,marginBottom:14,fontSize:12,color:MED,lineHeight:1.6,textAlign:"left",fontStyle:"italic"}}>
            Methodology adapted from Northwestern Kellogg's Detect Fakes research project (Kamali, Kumar, Nakamura, Chatzimparmpas, Hullman, Groh - PNAS 2022). Their public site is age 18+, so this is the in-workshop version of the same research methodology.
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn primary onClick={reset}>Try Again</Btn>
            <Btn onClick={onBack}>Menu</Btn>
          </div>
        </Card>
      </div>);
    }

    const judgeBtnStyle = (key, picked) => ({
      flex:1,
      padding:"10px 12px",
      borderRadius:10,
      fontSize:13,
      fontWeight:700,
      cursor:"pointer",
      fontFamily:"inherit",
      transition:"all .2s",
      border:`2px solid ${picked?TEAL:"#E0E8EE"}`,
      background:picked?"#F0FBF8":WHITE,
      color:picked?TEAL_DARK:DARK,
    });

    const confBtnStyle = (key, picked, disabled) => ({
      flex:1,
      padding:"10px 12px",
      borderRadius:10,
      fontSize:13,
      fontWeight:700,
      cursor:disabled?"not-allowed":"pointer",
      fontFamily:"inherit",
      transition:"all .2s",
      border:`2px solid ${picked?GOLD:"#E0E8EE"}`,
      background:picked?"#FFF9E6":WHITE,
      color:disabled?"#bbb":(picked?"#8A6A1A":DARK),
      opacity:disabled?0.55:1,
    });

    return (<div>
      <Card className="slide-up">
        <SectionLabel>Image {idx+1} of {IMAGES.length}</SectionLabel>
        <div style={{fontSize:15,fontWeight:800,color:NAVY,marginBottom:4}}>{img.title}</div>
        <p style={{fontSize:12,color:MED,marginBottom:12,fontStyle:"italic"}}>News headline says: {img.caption}</p>

        {/* Centered viewport with real embedded photograph */}
        <div style={{position:"relative",width:"100%",maxWidth:500,margin:"0 auto 14px",aspectRatio:"4/3",background:"#1a1a1a",borderRadius:10,overflow:"hidden",border:"2px solid "+NAVY}}>
          <img src={img.src} alt={img.title} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"contain",background:"#1a1a1a"}}/>
          <div style={{position:"absolute",top:8,right:10,background:"rgba(0,0,0,0.6)",color:"#0ABAB5",fontFamily:"Courier New, monospace",fontSize:11,fontWeight:700,padding:"4px 10px",borderRadius:6,textShadow:"0 0 6px rgba(10,186,181,0.6)"}}>
            DETECT FAKES PRACTICE
          </div>
        </div>

        {/* Q1 - Real or AI? */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:8}}>1. Real or AI-generated?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={() => !revealed && setJudge("Real")} disabled={revealed} style={judgeBtnStyle("Real", judge==="Real")}>Real photo</button>
            <button onClick={() => !revealed && setJudge("AI")} disabled={revealed} style={judgeBtnStyle("AI", judge==="AI")}>AI-generated</button>
            <button onClick={() => !revealed && setJudge("NotSure")} disabled={revealed} style={judgeBtnStyle("NotSure", judge==="NotSure")}>Not sure yet</button>
          </div>
        </div>

        {/* Q2 - Confidence */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:700,color:judge?NAVY:"#aaa",marginBottom:8}}>2. How confident are you?</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={() => judge && !revealed && setConf("Low")} disabled={!judge || revealed} style={confBtnStyle("Low", conf==="Low", !judge || revealed)}>Low</button>
            <button onClick={() => judge && !revealed && setConf("Medium")} disabled={!judge || revealed} style={confBtnStyle("Medium", conf==="Medium", !judge || revealed)}>Medium</button>
            <button onClick={() => judge && !revealed && setConf("High")} disabled={!judge || revealed} style={confBtnStyle("High", conf==="High", !judge || revealed)}>High</button>
          </div>
        </div>

        {/* Q3 - Evidence */}

              return (<div key={opt.id} onClick={() => toggleEvidence(opt.id)} style={{padding:"8px 12px",border:`2px solid ${picked?TEAL:"#E0E8EE"}`,borderRadius:8,cursor:revealed?"default":"pointer",background:picked?"#F0FBF8":WHITE,fontSize:12,color:picked?TEAL_DARK:DARK,fontWeight:picked?700:500,transition:"all .15s"}}>

          </div>
        </div>

        {!revealed && (
          <div style={{textAlign:"right"}}>
            <Btn primary onClick={submit} style={{opacity:(judge && conf)?1:0.5,cursor:(judge && conf)?"pointer":"not-allowed"}}>Submit</Btn>

          const tells = img.artifacts.map(a => a.label);

            </div>
          </div>);
        })()}

  function QuizMode({onBack}) {
    const [idx, setIdx] = useState(0);
    const [sel, setSel] = useState(null);
    const [score, setScore] = useState(0);
    const [done, setDone] = useState(false);
    const q = QUIZ[idx];

    const pick = (i) => {
      if (sel !== null) return;
      setSel(i);
      if (i === q.ans) setScore(s => s + 1);
    };
    const next = () => {
      if (idx + 1 < QUIZ.length) { setIdx(idx + 1); setSel(null); }
      else setDone(true);
    };

    if (done) {
      const pct = Math.round(score/QUIZ.length*100);
      return (<div className="fade-in">
        <Card style={{textAlign:"center"}}>
          <div style={{fontSize:48,marginBottom:8}}>{pct>=80?"🏆":pct>=60?"🌟":"💪"}</div>
          <div style={{fontSize:44,fontWeight:800,color:pct>=80?GREEN:pct>=60?GOLD:RED,lineHeight:1}}>{pct}%</div>
          <div style={{fontSize:15,fontWeight:700,color:NAVY,margin:"8px 0"}}>{score}/{QUIZ.length} correct</div>
          <div style={{padding:"12px 14px",background:"#FFF9E6",borderLeft:`4px solid ${GOLD}`,borderRadius:10,margin:"14px 0",fontSize:13,fontStyle:"italic",color:DARK,lineHeight:1.6,textAlign:"left"}}>
            <strong>Field Pearl:</strong> {randomPearl()}
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"center"}}>
            <Btn primary onClick={() => {setIdx(0);setSel(null);setScore(0);setDone(false);}}>Try Again</Btn>
            <Btn onClick={onBack}>Menu</Btn>
          </div>
        </Card>
      </div>);
    }

    return (<div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:13,fontWeight:700,color:MED}}>{idx+1}/{QUIZ.length}</span>
        <span style={{fontSize:13,fontWeight:700,color:TEAL}}>Score: {score}</span>
      </div>
      <div style={{height:6,background:"#E8EDF2",borderRadius:3,marginBottom:16,overflow:"hidden"}}>
        <div style={{height:"100%",background:`linear-gradient(90deg,${TEAL},${TEAL_DARK})`,width:`${((idx+1)/QUIZ.length)*100}%`,transition:"width .4s"}}/>
      </div>
      <Card>
        <p style={{fontSize:15,fontWeight:700,color:NAVY,marginBottom:16,lineHeight:1.5}}>{q.q}</p>
        <div style={{display:"grid",gap:8}}>
          {q.opts.map((o,i) => {
            let bg=WHITE, border="#E0E8EE";
            if (sel !== null && i === q.ans) {bg="#E8F8F1"; border=GREEN;}
            else if (sel !== null && i === sel) {bg="#FFF5F5"; border=RED;}
            return (<button key={i} onClick={() => pick(i)} style={{padding:"12px 16px",background:bg,border:`2px solid ${border}`,borderRadius:10,fontSize:14,fontWeight:600,color:DARK,cursor:sel!==null?"default":"pointer",textAlign:"left",fontFamily:"inherit",transition:"all .2s"}}>{o}</button>);
          })}
        </div>
        {sel !== null && (
          <div className="fade-in" style={{marginTop:14,padding:"12px 16px",borderRadius:10,background:sel===q.ans?"#E8F8F1":"#FFF5F5",borderLeft:`4px solid ${sel===q.ans?GREEN:RED}`,fontSize:13,color:DARK,lineHeight:1.6}}>
            {q.exp}
          </div>
        )}
        {sel !== null && (
          <div style={{textAlign:"right",marginTop:12}}>
            <Btn primary onClick={next}>{idx+1<QUIZ.length?"Next →":"Results"}</Btn>
          </div>
        )}
      </Card>
    </div>);
  }

  // ===== Main App =====
  function App() {
    const [screen, setScreen] = useState("welcome");

    if (screen === "welcome") {
      return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
        <AppHeader/>
        <div className="fade-in" style={{maxWidth:700,margin:"0 auto",padding:"0 16px 24px",flex:1}}>
          <div style={{textAlign:"center",padding:"28px 16px 20px"}}>
            <div style={{fontSize:48,marginBottom:8}}>🎭</div>
            <h1 style={{fontSize:26,fontWeight:800,color:NAVY,margin:"0 0 8px"}}>Deepfake Detector</h1>
            <p style={{fontSize:14,color:MED,lineHeight:1.6,maxWidth:480,margin:"0 auto"}}>Train your eye to spot AI-generated images, AI voices, and engineered disinformation. Same skills that get you hired in Bay Area Trust &amp; Safety.</p>
          </div>
          <div style={{display:"grid",gap:12,marginBottom:20}}>
            {[
              {key:"detect",icon:"🧪",title:"Detect Fakes Practice",desc:"8 images, Northwestern Kellogg-style methodology. Real or AI? How confident? What evidence? Track your accuracy and confidence calibration. Start here.",color:NAVY},
              {key:"headline",icon:"📰",title:"Headline Lab",desc:"5 headlines + 3 articles + 3 social posts. Practice SIFT and lateral reading on real misinformation patterns. Apply your Gem here.",color:"#7A2D4E"},
              {key:"spot",icon:"🎭",title:"Spot the Tells",desc:"8 AI images with hidden artifacts. Click each tell. The 8th is a real photo - try not to over-triage.",color:TEAL},
              {key:"voice",icon:"🔊",title:"Voice Analyzer",desc:"4 voice clips with annotated waveforms. Real human or AI clone? You decide.",color:GOLD},
              {key:"chain",icon:"🔍",title:"Source Verification Chain",desc:"How a fake spreads through 4 stages. Pick the right verification step at each stage.",color:"#7A2D4E"},
              {key:"quiz",icon:"🎯",title:"Quiz",desc:"8 questions on deepfake history, hand artifacts, EXIF, and Bay Area Trust & Safety careers.",color:RED},
            ].map(m => (<div key={m.key} onClick={() => setScreen(m.key)} style={{background:WHITE,borderRadius:R,padding:"18px 20px",boxShadow:SHADOW,border:"2px solid #E0E8EE",cursor:"pointer",transition:"all .25s",display:"flex",alignItems:"center",gap:16}} onMouseOver={e=>{e.currentTarget.style.borderColor=m.color;e.currentTarget.style.transform="translateY(-2px)"}} onMouseOut={e=>{e.currentTarget.style.borderColor="#E0E8EE";e.currentTarget.style.transform="none"}}>
              <div style={{width:52,height:52,borderRadius:14,background:`${m.color}12`,border:`2px solid ${m.color}25`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{m.icon}</div>
              <div><div style={{fontSize:16,fontWeight:800,color:NAVY,marginBottom:4}}>{m.title}</div><p style={{fontSize:12,color:MED,margin:0,lineHeight:1.5}}>{m.desc}</p></div>
            </div>))}
          </div>
          <div style={{background:"#FFF9E6",border:`2px solid ${GOLD}`,borderRadius:R,padding:14,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:NAVY,marginBottom:4}}>💡 Bay Area Career: Trust &amp; Safety Analyst</div>
            <p style={{fontSize:12,color:MED,margin:0,lineHeight:1.5}}>Twitter/X, Reddit, Meta, OpenAI, and Google all hire entry-level T&amp;S analysts ($70-90k Bay Area). Deepfake detection is the Day 1 skill.</p>
          </div>
          <div style={{marginTop:12,padding:"12px 14px",background:"#F8F9FA",border:"1px solid #E0E8EE",borderRadius:R,fontSize:11,color:MED,lineHeight:1.6}}>
            <strong style={{color:NAVY}}>Image credits.</strong> Real photographs from Pexels (pexels.com), used under the Pexels License (free for any use, no attribution required). AI-generated faces from thispersondoesnotexist.com, which serves StyleGAN2 outputs (Karras et al., NVIDIA, public research weights). The AI faces depict no real people. All eight images are used under their original licenses for educational purposes.
          </div>
        </div>
        <AppFooter/>
      </div>);
    }

    return (<div style={{minHeight:"100vh",display:"flex",flexDirection:"column"}}>
      <AppHeader subtitle={screen==="spot"?"Spot the Tells":screen==="detect"?"Detect Fakes Practice":screen==="voice"?"Voice Analyzer":screen==="chain"?"Verification Chain":screen==="headline"?"Headline Lab":"Quiz"}/>
      <div style={{maxWidth:700,margin:"0 auto",padding:"16px 16px 24px",flex:1,width:"100%"}}>
        <div style={{marginBottom:14}}>
          <button onClick={() => setScreen("welcome")} style={{background:"none",border:`2px solid ${TEAL}`,color:TEAL,borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>← Menu</button>
        </div>
        {screen === "spot" && <SpotMode onBack={() => setScreen("welcome")}/>}
        {screen === "detect" && <DetectFakesMode onBack={() => setScreen("welcome")}/>}
        {screen === "voice" && <VoiceMode onBack={() => setScreen("welcome")}/>}
        {screen === "chain" && <ChainMode onBack={() => setScreen("welcome")}/>}
        {screen === "headline" && <HeadlineMode onBack={() => setScreen("welcome")}/>}
        {screen === "quiz" && <QuizMode onBack={() => setScreen("welcome")}/>}
      </div>
      <AppFooter/>
    </div>);
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>

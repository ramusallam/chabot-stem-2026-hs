                            { number: 5, title: "Final Presentation", description: "Prepare your team's final presentation: The case verdict plus your AI Capability Map." }
                        ],
                        checkboxLabel: "I completed the evidence stations and created the AI Capability Map"
                    },
                    {
                        type: "digital",
                        title: "AI & Digital Literacy",
                        caseStudy: "The EU's AI Act, passed in 2024, requires that high-risk AI systems provide meaningful explanations of their decisions. In healthcare, this means an AI that recommends a diagnosis must be able to show which factors led to that recommendation. Critics argue this requirement could block the most accurate AI models - which are often the least explainable.",
                        videoUrl: "https://www.youtube.com/embed/jpUTQvewhI4",
                        steps: [
                            { number: 1, title: "Structured Debate", description: "Structured debate: AI systems should be required to explain their decisions before they can be used in high-stakes settings. Half the class argues for, half against." },
                            { number: 2, title: "Position Paper", description: "Write your personal position paper: What level of AI transparency should be required, and why? Support your position with specific examples from the workshop." },
                            { number: 3, title: "Final Reflection", description: "Final reflection: How has your understanding of AI changed over these two weeks? What will you do differently when you encounter AI in your life?" }
                        ],
                        checkboxLabel: "I participated in the debate and wrote my position paper"
                    },
                    {
                        type: "wrap",
                        title: "End of Day",
                        reminder: "Congratulations on completing the Chabot High School STEM Workshop! You now have the critical thinking tools to navigate an AI-powered world. Keep questioning, keep analyzing, keep demanding transparency.",
                        checkboxLabel: "I completed Day 8"
                    }
                ]
            }
        ];

        // State
        let currentDay = 1;
        let checkboxStates = {};
        let appLoadStates = {};

        // Initialize
        function init() {
            renderSidebar();
            showDay(1);
            setupEventListeners();
        }

        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = '';

            days.forEach(day => {
                const button = document.createElement('button');
                button.className = 'nav-button';
                if (day.number === currentDay) button.classList.add('active');

                const dayCheckboxes = Object.keys(checkboxStates).filter(key => key.startsWith(`day${day.number}-`));
                const allChecked = dayCheckboxes.length === 4 && dayCheckboxes.every(key => checkboxStates[key]);
                if (allChecked && dayCheckboxes.length > 0) button.classList.add('complete');

                const progress = dayCheckboxes.length > 0
                    ? Math.round((dayCheckboxes.filter(key => checkboxStates[key]).length / 4) * 100)
                    : 0;

                button.innerHTML = `
                    <div class="nav-icon">${day.number}</div>
                    <div class="nav-label">Day ${day.number}</div>
                    <div class="nav-progress">${progress}%</div>
                `;

                button.addEventListener('click', () => {
                    showDay(day.number);
                    closeMobileMenu();
                });

                nav.appendChild(button);
            });
        }

        function showDay(dayNumber) {
            currentDay = dayNumber;
            const day = days.find(d => d.number === dayNumber);
            if (!day) return;

            document.querySelectorAll('.day-container').forEach(container => {
                container.classList.remove('active');
            });

            const existing = document.getElementById(`day${dayNumber}`);
            if (existing) existing.remove();

            const container = document.createElement('div');
            container.id = `day${dayNumber}`;
            container.className = 'day-container active';
            container.innerHTML = renderDay(day);

            document.getElementById('main-container').appendChild(container);

            attachCheckboxListeners(day);
            attachAppListeners(day);

            updateSidebar();

            window.scrollTo(0, 0);
        }

        const NOTEBOOK_CALLOUT = `
            <div class="callout-notebook">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                </svg>
                <p class="callout-notebook-text"><strong>Woven notebook:</strong> open your notebook now. As you move through this phase, write your answers to every reflection, discussion, and case-study question before moving on. Your notebook is the record of your thinking.</p>
            </div>
        `;

        function renderDay(day) {
            let html = `
                <div class="day-header">
                    <h1>Day ${day.number}: ${day.title}</h1>
                    <div class="day-header-subtitle">${day.subtitle}</div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${getProgress(day.number)}%">
                            <div class="progress-text">${Math.round(getProgress(day.number))}%</div>
                        </div>
                    </div>
                </div>
            `;

            const hook = day.parts[0];
            html += `
                <div class="part-heading">
                    <div class="part-badge hook">Part I</div>
                    <h2>${hook.title}</h2>
                </div>

                <div class="section-card hook">
                    ${NOTEBOOK_CALLOUT}
                    <p>${hook.context}</p>
                    <p><strong>${hook.welcome}</strong></p>

                    <div class="callout">
                        <label class="callout-label">Today's Case Briefing:</label>
                        <p>${hook.briefing}</p>
                    </div>

                    <div class="video-wrapper">
                        <iframe src="${hook.videoUrl}" allowfullscreen="" loading="lazy"></iframe>
                    </div>

                    <div class="checkbox-card">
                        <input type="checkbox" id="day${day.number}-checkbox-hook" class="checkbox-input">
                        <label class="checkbox-label" for="day${day.number}-checkbox-hook">${hook.checkboxLabel}</label>
                    </div>
                </div>
            `;

            const lab = day.parts[1];
            html += `
                <div class="part-heading">
                    <div class="part-badge lab">Part II</div>
                    <h2>${lab.title}</h2>
                </div>

                <div class="section-card lab">
                    ${NOTEBOOK_CALLOUT}
                    <div class="materials-box">
                        <label class="materials-title">Materials Needed</label>
                        <div class="materials-grid">
                            ${lab.materials.map(item => `
                                <div class="material-item">
                                    <span class="material-bullet">&#8226;</span>
                                    <span>${item}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="steps-container">
                        ${lab.appInstructions ? `
                            <div class="step">
                                <div class="step-circle">1</div>
                                <div class="step-content">
                                    <div class="step-title">Interactive App</div>
                                    <div class="step-description">${lab.appInstructions}</div>
                                </div>
                            </div>

                            <div class="app-container">
                                <button class="app-launch-button" data-app-key="${lab.appKey}">
                                    <div class="play-icon"></div>
                                    Launch Interactive App
                                </button>
                                <iframe class="app-iframe" title="Workshop App"></iframe>
                            </div>
                        ` : ''}

                        ${lab.steps.map(step => `
                            <div class="step">
                                <div class="step-circle">${step.number}</div>
                                <div class="step-content">
                                    <div class="step-title">${step.title}</div>
                                    <div class="step-description">${step.description}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="checkbox-card">
                        <input type="checkbox" id="day${day.number}-checkbox-lab" class="checkbox-input">
                        <label class="checkbox-label" for="day${day.number}-checkbox-lab">${lab.checkboxLabel}</label>
                    </div>
                </div>
            `;

            const digital = day.parts[2];
            html += `
                <div class="part-heading">
                    <div class="part-badge digital">Part III</div>
                    <h2>${digital.title}</h2>
                </div>

                <div class="section-card digital">
                    ${NOTEBOOK_CALLOUT}
                    <div class="callout">
                        <label class="callout-label">Case Study:</label>
                        <p>${digital.caseStudy}</p>
                    </div>

                    <div class="video-wrapper">
                        <iframe src="${digital.videoUrl}" allowfullscreen="" loading="lazy"></iframe>
                    </div>

                    <div class="steps-container">
                        ${digital.steps.map(step => `
                            <div class="step">
                                <div class="step-circle">${step.number}</div>
                                <div class="step-content">
                                    <div class="step-title">${step.title}</div>
                                    <div class="step-description">${step.description}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="checkbox-card">
                        <input type="checkbox" id="day${day.number}-checkbox-digital" class="checkbox-input">
                        <label class="checkbox-label" for="day${day.number}-checkbox-digital">${digital.checkboxLabel}</label>
                    </div>
                </div>
            `;

            const wrap = day.parts[3];
            html += `
                <div class="part-heading">
                    <div class="part-badge wrap">Part IV</div>
                    <h2>${wrap.title}</h2>
                </div>

                <div class="section-card wrap">
                    ${NOTEBOOK_CALLOUT}
                    <div class="callout" style="border-left-color: #D4A843;">
                        <p>${wrap.reminder}</p>
                    </div>

                    <div class="checkbox-card">
                        <input type="checkbox" id="day${day.number}-checkbox-wrap" class="checkbox-input">
                        <label class="checkbox-label" for="day${day.number}-checkbox-wrap">${wrap.checkboxLabel}</label>
                    </div>
                </div>
            `;

            html += `
                <div class="footer">
                    <svg class="footer-logo" viewBox="0 0 40 40"><polygon points="13,2 24,13 13,24 2,13" fill="#0ABAB5" opacity="0.85"/><polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity="0.85"/><polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity="0.85"/><polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity="0.85"/></svg>
                    <p class="footer-text">Built by Woven Learning & Technology</p>
                    <div class="footer-edit">
                        <a href="#" onclick="editAuth(event)">Edit</a>
                    </div>
                </div>
            `;

            return html;
        }

        function attachCheckboxListeners(day) {
            for (let i = 0; i < 4; i++) {
                const parts = ['hook', 'lab', 'digital', 'wrap'];
                const part = parts[i];
                const checkbox = document.getElementById(`day${day.number}-checkbox-${part}`);

                if (checkbox) {
                    const key = `day${day.number}-${part}`;
                    if (checkboxStates[key]) checkbox.checked = true;

                    checkbox.addEventListener('change', (e) => {
                        checkboxStates[key] = e.target.checked;
                        updateSidebar();
                    });
                }
            }
        }

        function launchApp(button) {
            const appKey = button.dataset.appKey;
            const html = appHtmlMap[appKey];

            if (!html) {
                console.error('App not found:', appKey);
                return;
            }

            const wrapper = button.closest('.app-container');
            const iframe = wrapper.querySelector('iframe');

            if (!iframe.src || iframe.src === 'about:blank') {
                const blob = new Blob([html], { type: 'text/html' });
                iframe.src = URL.createObjectURL(blob);
            }

            iframe.classList.add('loaded');
            button.style.display = 'none';
        }

        function attachAppListeners(day) {
            const buttons = document.querySelectorAll('.app-launch-button');
            buttons.forEach(button => {
                button.addEventListener('click', (e) => {
                    launchApp(e.currentTarget);
                });
            });
        }

        function getProgress(dayNumber) {
            const dayCheckboxes = Object.keys(checkboxStates).filter(key => key.startsWith(`day${dayNumber}-`));
            if (dayCheckboxes.length === 0) return 0;
            return (dayCheckboxes.filter(key => checkboxStates[key]).length / 4) * 100;
        }

        function updateSidebar() {
            renderSidebar();
        }

        function setupEventListeners() {
            const hamburger = document.getElementById('hamburger');
            const overlay = document.getElementById('overlay');
            const sidebar = document.getElementById('sidebar');

            hamburger.addEventListener('click', openMobileMenu);
            overlay.addEventListener('click', closeMobileMenu);
        }

        function openMobileMenu() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closeMobileMenu() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        // Studio meta + edit hook
        const WORKSHOP_META = {
            title: "Chabot STEM 2026 — High School",
            program: "High School (Rising 9th-11th)",
            dates: "June 22 - July 2",
            slug: "chabot-stem-2026-hs",
            storageKey: "woven-chabot-2026-hs"
        };

        function editAuth(e) {
            if (e) e.preventDefault();
            const p = prompt("Enter edit password:");
            if (p === "w0ven") {
                const base = window.location.origin;
                window.open("https://woven-workshop-studio.vercel.app/?load=" + encodeURIComponent(base + "/content.json"), "_blank");
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>

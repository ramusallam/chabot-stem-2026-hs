// ===== Helper math =====
// Bayesian update: prior probability + likelihood ratio → posterior probability
function bayesUpdate(prior, lr) {
  if (prior <= 0) return 0;
  if (prior >= 1) return 1;
  const priorOdds = prior / (1 - prior);
  const newOdds = priorOdds * lr;
  return newOdds / (newOdds + 1);
}

// Combine: start with prior, apply each LR in sequence
function combinePosterior(prior, lrs) {
  let p = prior;
  for (const lr of lrs) p = bayesUpdate(p, lr);
  return p;
}

function fmtProb(p) {
  if (p >= 0.99999) return ">99.999%";
  if (p >= 0.999) return (p * 100).toFixed(3) + "%";
  if (p >= 0.99) return (p * 100).toFixed(2) + "%";
  return (p * 100).toFixed(1) + "%";
}

function fmtLR(lr) {
  if (lr >= 1000) return lr.toExponential(1).replace("+", "");
  if (lr >= 10) return lr.toFixed(0);
  if (lr >= 1) return lr.toFixed(2);
  return lr.toFixed(2);
}

// ===== Mode 1: Build the Case =====
function BuildCase({ onBack }) {
  const [caseId, setCaseId] = useState(null);
  const selectedCase = CASES.find(c => c.id === caseId);
  // Slider state per evidence id
  const [sliders, setSliders] = useState({});
  const [showVerdict, setShowVerdict] = useState(false);
  const [pearl, setPearl] = useState("");

  useEffect(() => {
    if (selectedCase) {
      const init = {};
      selectedCase.evidence.forEach(e => { init[e.id] = e.slider.default; });
      setSliders(init);
      setShowVerdict(false);
    }
  }, [caseId]);

  function pickCase(id) {
    setCaseId(id);
    setPearl(PEARLS[Math.floor(Math.random() * PEARLS.length)]);
  }

  if (!selectedCase) {
    return (
      <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
        <BackBtn onClick={onBack} />
        <div style={{ fontSize: 22, fontWeight: 800, color: NAVY, marginBottom: 6 }}>Build the Case</div>
        <div style={{ fontSize: 13, color: MED, lineHeight: 1.55, marginBottom: 16 }}>
          Pick one of four cases. You'll be given the evidence, you adjust each piece's match strength, and the app combines them via Bayes' theorem to produce a case strength meter. Threshold for conviction: ~95-99%.
        </div>
        <div style={{ display: "grid", gap: 12 }}>
          {CASES.map(c => (
            <div key={c.id} onClick={() => pickCase(c.id)}
                 style={{ background: WHITE, borderRadius: R, padding: 18, boxShadow: SHADOW, cursor: "pointer", border: "2px solid transparent", transition: "all .2s" }}
                 onMouseOver={e => e.currentTarget.style.borderColor = TEAL}
                 onMouseOut={e => e.currentTarget.style.borderColor = "transparent"}>
              <SectionLabel>{c.location}</SectionLabel>
              <div style={{ fontSize: 17, fontWeight: 800, color: NAVY, marginBottom: 6 }}>{c.title}</div>
              <div style={{ fontSize: 13, color: MED, lineHeight: 1.55 }}>{c.summary}</div>
              <div style={{ marginTop: 10, fontSize: 11, fontWeight: 700, color: TEAL_DARK, letterSpacing: 1, textTransform: "uppercase" }}>
                {c.evidence.length} evidence items · prior {(c.prior * 100).toFixed(0)}% · threshold {(c.threshold * 100).toFixed(0)}%
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // Compute likelihood ratios for each evidence item
  const lrs = selectedCase.evidence.map(e => e.lrFn(sliders[e.id] ?? e.slider.default));
  const posterior = combinePosterior(selectedCase.prior, lrs);
  const meets = posterior >= selectedCase.threshold;
  // Compute single-evidence-only posterior, for comparison
  const singleBest = Math.max(...lrs.map(lr => bayesUpdate(selectedCase.prior, lr)));

  return (
    <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
      <BackBtn onClick={() => setCaseId(null)} />
      <Card>
        <SectionLabel>{selectedCase.location}</SectionLabel>
        <div style={{ fontSize: 19, fontWeight: 800, color: NAVY, marginBottom: 8 }}>{selectedCase.title}</div>
        <div style={{ fontSize: 13, color: MED, lineHeight: 1.55, marginBottom: 12 }}>{selectedCase.summary}</div>
        <div style={{ display: "flex", gap: 10, fontSize: 11, fontWeight: 700, color: TEAL_DARK, letterSpacing: 1, textTransform: "uppercase" }}>
          <span style={{ background: "#E8F5F2", padding: "4px 10px", borderRadius: 6 }}>Prior P(guilt) {(selectedCase.prior * 100).toFixed(0)}%</span>
          <span style={{ background: "#FFF8E1", padding: "4px 10px", borderRadius: 6, color: "#8B6914" }}>Threshold {(selectedCase.threshold * 100).toFixed(0)}%</span>
        </div>
      </Card>

      <Card>
        <SectionLabel>Evidence — adjust match strength</SectionLabel>
        {selectedCase.evidence.map((e, idx) => {
          const v = sliders[e.id] ?? e.slider.default;
          const lr = e.lrFn(v);
          return (
            <div key={e.id} style={{ marginBottom: 18, paddingBottom: 14, borderBottom: idx < selectedCase.evidence.length - 1 ? "1px dashed #E0E8EE" : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: NAVY }}>{e.label}</div>
                <div className="mono" style={{ fontSize: 12, color: TEAL_DARK, fontWeight: 700 }}>LR = {fmtLR(lr)}</div>
              </div>
              <div style={{ fontSize: 12, color: MED, lineHeight: 1.5, marginBottom: 8 }}>{e.description}</div>
              <input type="range"
                     min={e.slider.min} max={e.slider.max} step={e.slider.step} value={v}
                     onChange={ev => setSliders(s => ({ ...s, [e.id]: parseFloat(ev.target.value) }))} />
              <div className="mono" style={{ fontSize: 11, color: MED, marginTop: 4, textAlign: "center" }}>
                {e.slider.labelFn(v)}
              </div>
            </div>
          );
        })}
      </Card>

      <Card style={{ background: meets ? "linear-gradient(135deg, #E8F8F1 0%, #D4F0E1 100%)" : "linear-gradient(135deg, #FFF8E1 0%, #FEF3D1 100%)", border: `2px solid ${meets ? GREEN : GOLD}` }}>
        <SectionLabel>Case strength meter</SectionLabel>
        <div className="mono" style={{ fontSize: 28, fontWeight: 800, color: meets ? GREEN : "#8B6914", textAlign: "center", marginBottom: 4 }}>
          {fmtProb(posterior)}
        </div>
        <div style={{ fontSize: 11, color: MED, textAlign: "center", marginBottom: 12 }}>
          P(suspect did it | all evidence)
        </div>
        <div style={{ background: "#E0E8EE", borderRadius: 6, height: 14, position: "relative", overflow: "hidden", marginBottom: 12 }}>
          <div style={{ background: meets ? `linear-gradient(135deg, ${GREEN}, #1E8449)` : `linear-gradient(135deg, ${YELLOW}, #B7740C)`, width: `${posterior * 100}%`, height: "100%", transition: "width 0.4s" }} />
          <div style={{ position: "absolute", left: `${selectedCase.threshold * 100}%`, top: 0, bottom: 0, width: 2, background: RED, opacity: 0.6 }} />
        </div>
        <div style={{ fontSize: 11, color: MED, display: "flex", justifyContent: "space-between" }}>
          <span>0%</span>
          <span style={{ color: RED }}>↑ threshold {(selectedCase.threshold * 100).toFixed(0)}%</span>
          <span>100%</span>
        </div>
        <div style={{ marginTop: 14, padding: "10px 14px", background: "rgba(255,255,255,0.6)", borderRadius: 8, fontSize: 12, color: NAVY, lineHeight: 1.55 }}>
          <strong>Single best evidence alone:</strong> <span className="mono">{fmtProb(singleBest)}</span> — {singleBest >= selectedCase.threshold ? "would meet threshold" : "INSUFFICIENT alone"}.<br />
          <strong>Combined Bayesian:</strong> <span className="mono">{fmtProb(posterior)}</span> — {meets ? "meets threshold." : "still below threshold."}
        </div>
      </Card>

      <Btn primary onClick={() => setShowVerdict(true)} style={{ width: "100%", marginBottom: 16 }}>
        Take it to the jury →
      </Btn>

      {showVerdict && (
        <Card className="slide-up" style={{ background: meets ? "linear-gradient(135deg, #1B3A5C 0%, #2A9D8F 100%)" : "linear-gradient(135deg, #7A2D4E 0%, #C0392B 100%)", color: WHITE }}>
          <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: GOLD, textTransform: "uppercase", marginBottom: 8 }}>Verdict in this case</div>
          <div style={{ fontSize: 18, fontWeight: 800, lineHeight: 1.4, marginBottom: 10 }}>
            {meets
              ? `${fmtProb(posterior)} confidence — meets the "${(selectedCase.threshold * 100).toFixed(0)}%" threshold for beyond reasonable doubt.`
              : `${fmtProb(posterior)} confidence — INSUFFICIENT to convict. Defense will argue reasonable doubt.`}
          </div>
          <div style={{ fontSize: 13, lineHeight: 1.6, opacity: 0.95 }}>
            {meets
              ? "In a real trial, the prosecution presents each evidence type independently. Their multiplicative effect on a juror's belief — the implicit Bayesian update — is what produces conviction-grade certainty."
              : "If you went to trial with this evidence, a court-qualified defense expert would attack each piece individually. You need additional evidence — physical, digital, or testimonial — before charging."}
          </div>
          <div style={{ marginTop: 14, padding: 12, background: "rgba(255,255,255,0.12)", borderRadius: 8, fontSize: 12, lineHeight: 1.55 }}>
            <strong style={{ color: GOLD }}>Director's Pearl:</strong> {pearl}
          </div>
          <div style={{ marginTop: 14, display: "flex", gap: 8 }}>
            <Btn onClick={() => { setCaseId(null); setShowVerdict(false); }} style={{ background: WHITE, color: NAVY, flex: 1 }}>Try another case</Btn>
          </div>
        </Card>
      )}
    </div>
  );
}

          Four real cases where reliance on a single evidence type led to wrongful conviction. Click through the timeline of each.

                <div className="mono" style={{ fontSize: 12, color: MED, fontWeight: 700 }}>{e.year}</div>
              </div>
              <div style={{ fontSize: 11, fontWeight: 700, color: RED, letterSpacing: 1, textTransform: "uppercase", marginTop: 4 }}>

    { tag: "Multi-Modal Could Have Saved Them", color: GREEN, body: c.multimodal }

    <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
      <BackBtn onClick={() => setPicked(null)} />
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}>

          <div className="mono" style={{ fontSize: 13, color: MED, fontWeight: 700 }}>{c.year}</div>

        <div style={{ fontSize: 11, fontWeight: 700, color: RED, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>

        </div>

          <Btn primary onClick={() => setStep(step + 1)}>Next →</Btn>

          <Btn primary onClick={() => setPicked(null)}>Pick another case</Btn>

      {/* Step indicator */}
      <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 12 }}>
        {steps.map((st, i) => (
          <div key={i}
               onClick={() => setStep(i)}
               style={{ width: i === step ? 24 : 10, height: 10, borderRadius: 5,
                        background: i <= step ? st.color : "#E0E8EE",
                        cursor: "pointer", transition: "width 0.2s" }} />
        ))}
      </div>
    </div>
  );
}

// ===== Mode 3: Bayesian Logic Lab =====
function BayesLab({ onBack }) {
  const [prior, setPrior] = useState(0.20);
  const [lrFp, setLrFp] = useState(50);
  const [lrDna, setLrDna] = useState(1000);
  const [lrSpatter, setLrSpatter] = useState(8);
  const [lrCam, setLrCam] = useState(15);
  const [steps, setSteps] = useState({ fp: true, dna: true, spatter: true, cam: false });

  // Compute step-by-step posterior
  const sequence = [];
  let p = prior;
  sequence.push({ name: "Prior (base rate)", lr: null, p });
  if (steps.fp) { p = bayesUpdate(p, lrFp); sequence.push({ name: "Fingerprint", lr: lrFp, p }); }
  if (steps.dna) { p = bayesUpdate(p, lrDna); sequence.push({ name: "DNA profile", lr: lrDna, p }); }
  if (steps.spatter) { p = bayesUpdate(p, lrSpatter); sequence.push({ name: "Blood spatter", lr: lrSpatter, p }); }
  if (steps.cam) { p = bayesUpdate(p, lrCam); sequence.push({ name: "Surveillance camera", lr: lrCam, p }); }

  return (
    <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
      <BackBtn onClick={onBack} />
      <Card>
        <SectionLabel>Bayesian Logic Lab</SectionLabel>
        <div style={{ fontSize: 19, fontWeight: 800, color: NAVY, marginBottom: 8 }}>How a juror's belief actually updates</div>
        <div style={{ fontSize: 13, color: MED, lineHeight: 1.55, marginBottom: 12 }}>
          Bayes' theorem: <strong className="mono" style={{ color: NAVY }}>posterior odds = prior odds × likelihood ratio</strong>. Each new piece of evidence multiplies the odds. Toggle evidence on/off and watch the posterior climb (or stall).
        </div>
        <div style={{ background: "#F0F6F5", padding: 12, borderRadius: 8, fontSize: 12, color: NAVY, lineHeight: 1.6 }} className="mono">
          P(guilt | evidence) = (P(evidence | guilt) × P(guilt)) / P(evidence)
        </div>
      </Card>

      <Card>
        <SectionLabel>Prior probability of guilt</SectionLabel>
        <div style={{ fontSize: 12, color: MED, lineHeight: 1.5, marginBottom: 8 }}>
          Before any forensic evidence, how likely was the suspect — based on motive, opportunity, and investigation context? Most criminal investigations start at 10-30%.
        </div>
        <input type="range" min="0.01" max="0.5" step="0.01" value={prior}
               onChange={e => setPrior(parseFloat(e.target.value))} />
        <div className="mono" style={{ textAlign: "center", marginTop: 6, fontSize: 14, fontWeight: 700, color: NAVY }}>
          Prior P(guilt) = {(prior * 100).toFixed(0)}%
        </div>
      </Card>

      <Card>
        <SectionLabel>Evidence likelihood ratios</SectionLabel>
        <div style={{ fontSize: 12, color: MED, lineHeight: 1.5, marginBottom: 14 }}>
          Each LR = how many times more likely this evidence is if the suspect is guilty than if innocent. Toggle each piece on/off and adjust the strength.
        </div>

        <EvidenceSlider label="Fingerprint match"
                        on={steps.fp} setOn={(v) => setSteps(s => ({...s, fp: v}))}
                        v={lrFp} setV={setLrFp} min={1} max={1000} step={1}
                        format={(x) => `LR = ${fmtLR(x)}`}
                        hint="6-8 minutiae ≈ LR 10-100. 12+ minutiae ≈ LR 10⁴+." />
        <EvidenceSlider label="DNA STR profile"
                        on={steps.dna} setOn={(v) => setSteps(s => ({...s, dna: v}))}
                        v={lrDna} setV={setLrDna} min={1} max={1000000} step={1}
                        format={(x) => `LR = ${fmtLR(x)}`}
                        hint="Typical 13-loci CODIS profile: LR ≈ 10⁹. Partial profile: 10³-10⁶." />
        <EvidenceSlider label="Blood spatter analysis"
                        on={steps.spatter} setOn={(v) => setSteps(s => ({...s, spatter: v}))}
                        v={lrSpatter} setV={setLrSpatter} min={1} max={50} step={1}
                        format={(x) => `LR = ${fmtLR(x)}`}
                        hint="BSA is class-level, not individualizing. Typical LR = 5-20." />
        <EvidenceSlider label="Surveillance facial ID"
                        on={steps.cam} setOn={(v) => setSteps(s => ({...s, cam: v}))}
                        v={lrCam} setV={setLrCam} min={1} max={200} step={1}
                        format={(x) => `LR = ${fmtLR(x)}`}
                        hint="Modern FR algorithms claim LR up to 10³ in good lighting; lower with hat/mask/grain." />
      </Card>

      <Card>
        <SectionLabel>Step-by-step posterior</SectionLabel>
        <div style={{ display: "grid", gap: 8 }}>
          {sequence.map((row, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: i === sequence.length - 1 ? "#E8F8F1" : "#F7F9FC", borderRadius: 8, border: i === sequence.length - 1 ? `2px solid ${GREEN}` : "1px solid #E0E8EE" }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: NAVY }}>
                {i === 0 ? "" : `+ `}{row.name}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                {row.lr != null && <span className="mono" style={{ fontSize: 11, color: MED }}>×{fmtLR(row.lr)}</span>}
                <span className="mono" style={{ fontSize: 14, fontWeight: 800, color: i === sequence.length - 1 ? GREEN : NAVY }}>{fmtProb(row.p)}</span>
              </div>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 16, padding: 14, background: "linear-gradient(135deg, #FFF8E1 0%, #FEF3D1 100%)", borderLeft: `4px solid ${GOLD}`, borderRadius: 8, fontSize: 12, color: NAVY, lineHeight: 1.6 }}>
          <strong style={{ color: "#8B6914" }}>Watch the multiplication:</strong> turn off DNA. Watch the posterior collapse. Then turn on just spatter + camera. Notice that "lots of weak evidence" can be weaker than one strong piece — but combined STRONG evidence types are nearly impossible to argue against.
        </div>
      </Card>
    </div>
  );
}

function EvidenceSlider({ label, on, setOn, v, setV, min, max, step, format, hint }) {
  return (
    <div style={{ marginBottom: 14, paddingBottom: 12, borderBottom: "1px dashed #E0E8EE", opacity: on ? 1 : 0.5 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, fontWeight: 700, color: NAVY, cursor: "pointer" }}>
          <input type="checkbox" checked={on} onChange={e => setOn(e.target.checked)} style={{ width: 16, height: 16 }} />
          {label}
        </label>
        <span className="mono" style={{ fontSize: 12, color: TEAL_DARK, fontWeight: 700 }}>{format(v)}</span>
      </div>
      <div style={{ fontSize: 11, color: MED, lineHeight: 1.4, marginBottom: 6 }}>{hint}</div>
      <input type="range" min={min} max={max} step={step} value={v}
             disabled={!on}
             onChange={e => setV(parseFloat(e.target.value))} />
    </div>
  );
}

// ===== Mode 4: Quiz =====
function Quiz({ onBack }) {
  const [idx, setIdx] = useState(0);
  const [picked, setPicked] = useState(null);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  if (done) {
    const pct = Math.round((score / QUIZ.length) * 100);
    return (
      <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
        <BackBtn onClick={onBack} />
        <Card style={{ textAlign: "center", background: "linear-gradient(135deg, #1B3A5C 0%, #2A9D8F 100%)", color: WHITE }}>
          <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: GOLD, textTransform: "uppercase", marginBottom: 8 }}>Court is adjourned</div>
          <div style={{ fontSize: 56, marginBottom: 8 }}>{pct >= 75 ? "⚖️" : "📋"}</div>
          <div className="mono" style={{ fontSize: 36, fontWeight: 800, marginBottom: 4 }}>{score} / {QUIZ.length}</div>
          <div style={{ fontSize: 14, opacity: 0.92, marginBottom: 16 }}>
            {pct >= 87 ? "Court-qualified expert. You'd survive a Daubert hearing."
             : pct >= 62 ? "Solid analyst. Brush up on Bayesian odds vs. probability."
             : "Worth a re-read. Bayes is a tool you'll keep using."}
          </div>
          <div style={{ padding: 12, background: "rgba(255,255,255,0.12)", borderRadius: 8, fontSize: 12, lineHeight: 1.6, marginBottom: 14 }}>
            <strong style={{ color: GOLD }}>Pearl:</strong> {PEARLS[Math.floor(Math.random() * PEARLS.length)]}
          </div>
          <Btn onClick={() => { setIdx(0); setPicked(null); setScore(0); setDone(false); }} style={{ background: WHITE, color: NAVY }}>Retry</Btn>
        </Card>
      </div>
    );
  }

  const q = QUIZ[idx];
  const showExplain = picked != null;

  return (
    <div className="fade-in" style={{ padding: "16px", maxWidth: 720, margin: "0 auto" }}>
      <BackBtn onClick={onBack} />
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <SectionLabel>Question {idx + 1} of {QUIZ.length}</SectionLabel>
          <div className="mono" style={{ fontSize: 12, color: TEAL_DARK, fontWeight: 700 }}>Score: {score}</div>
        </div>
        <div style={{ fontSize: 16, fontWeight: 700, color: NAVY, lineHeight: 1.5, marginBottom: 16 }}>{q.q}</div>
        <div style={{ display: "grid", gap: 8 }}>
          {q.options.map((opt, i) => {
            const isPicked = picked === i;
            const isCorrect = i === q.correct;
            let bg = WHITE, color = NAVY, border = `2px solid #E0E8EE`;
            if (showExplain) {
              if (isCorrect) { bg = "#E8F8F1"; border = `2px solid ${GREEN}`; }
              else if (isPicked) { bg = "#FADBD8"; border = `2px solid ${RED}`; }
            } else if (isPicked) {
              border = `2px solid ${TEAL}`;
            }
            return (
              <button key={i}
                      onClick={() => {
                        if (showExplain) return;
                        setPicked(i);
                        if (i === q.correct) setScore(s => s + 1);
                      }}
                      style={{
                        background: bg, color, border, borderRadius: 10,
                        padding: "12px 14px", fontSize: 13, fontWeight: 600,
                        textAlign: "left", cursor: showExplain ? "default" : "pointer",
                        fontFamily: "inherit", transition: "all .2s",
                        display: "flex", alignItems: "center", gap: 10
                      }}>
                <div style={{ width: 22, height: 22, borderRadius: 11, background: showExplain && isCorrect ? GREEN : (showExplain && isPicked ? RED : "#F0F4F8"), color: showExplain && (isCorrect || isPicked) ? WHITE : MED, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>
                  {String.fromCharCode(65 + i)}
                </div>
                <div style={{ flex: 1, lineHeight: 1.45 }}>{opt}</div>
              </button>
            );
          })}
        </div>
        {showExplain && (
          <div className="slide-up" style={{ marginTop: 16, padding: 14, background: picked === q.correct ? "#E8F8F1" : "#FADBD8", borderLeft: `4px solid ${picked === q.correct ? GREEN : RED}`, borderRadius: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", color: picked === q.correct ? GREEN : RED, marginBottom: 6 }}>
              {picked === q.correct ? "Correct" : "Not quite"}
            </div>
            <div style={{ fontSize: 13, color: NAVY, lineHeight: 1.6 }}>{q.explanation}</div>
          </div>
        )}
        {showExplain && (
          <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end" }}>
            {idx < QUIZ.length - 1 ? (
              <Btn primary onClick={() => { setIdx(idx + 1); setPicked(null); }}>Next question →</Btn>
            ) : (
              <Btn primary onClick={() => setDone(true)}>See verdict</Btn>
            )}
          </div>
        )}
      </Card>
    </div>
  );
}

// ===== Root =====
function App() {
  const [mode, setMode] = useState(null);
  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <AppHeader subtitle="Evidence Synthesizer" />
      <div style={{ flex: 1 }}>
        {mode == null && <Welcome onPick={setMode} />}
        {mode === "build" && <BuildCase onBack={() => setMode(null)} />}
        {mode === "wrong" && <WrongConviction onBack={() => setMode(null)} />}
        {mode === "lab" && <BayesLab onBack={() => setMode(null)} />}
        {mode === "quiz" && <Quiz onBack={() => setMode(null)} />}
      </div>
      <AppFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

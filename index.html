<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chabot STEM 2026 - High School Workshop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.7;
        }

        body {
            display: flex;
            flex-direction: row;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: #fff;
            border-right: 1px solid #e0ebe9;
            box-shadow: 2px 0 8px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar-header {
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            padding: 16px 12px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .sidebar-header-content {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .sidebar-logo {
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 0.8rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-meta {
            font-size: 0.62rem;
            opacity: 0.7;
            white-space: nowrap;
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
        }

        .nav-button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 7px 9px;
            margin-bottom: 3px;
            background-color: transparent;
            border: 1px solid transparent;
            border-radius: 7px;
            font-size: 0.74rem;
            color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .nav-button:hover {
            background-color: #f0f5f5;
            border-color: #e0ebe9;
        }

        .nav-button.active {
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            border-color: #1A6B6B;
        }

        .nav-button.complete {
            border-color: #D4A843;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.72rem;
            border-radius: 4px;
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            flex-shrink: 0;
        }

        .nav-button.complete .nav-icon {
            background: linear-gradient(135deg, #D4A843 0%, #c89c2a 100%);
        }

        .nav-label {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-progress {
            font-size: 0.58rem;
            color: #999;
            min-width: 30px;
            text-align: right;
        }

        .nav-button.active .nav-progress {
            color: white;
        }

        .sidebar-bottom {
            padding: 12px 8px;
            border-top: 1px solid #e0ebe9;
            text-align: center;
        }

        .edit-link {
            display: inline-block;
            font-size: 0.65rem;
            color: #1A6B6B;
            border: 1px dashed #1A6B6B;
            padding: 6px 10px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .edit-link:hover {
            background-color: #f0f5f5;
        }

        /* HAMBURGER MENU */
        .hamburger {
            display: none;
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1001;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #1A6B6B;
        }

        /* MAIN CONTENT */
        .main-container {
            margin-left: 240px;
            flex: 1;
            padding: 28px 36px;
            max-width: 900px;
            width: calc(100% - 240px);
        }

        .day-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .day-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* DAY HEADER */
        .day-header {
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            padding: 28px 26px;
            border-radius: 14px;
            margin-bottom: 24px;
        }

        .day-header h1 {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .day-header-subtitle {
            font-size: 0.95rem;
            opacity: 0.85;
            margin-bottom: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255,255,255,0.3);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2A9D8F 0%, #D4A843 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
            width: 0%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
        }

        .progress-text {
            font-size: 0.65rem;
            color: white;
            white-space: nowrap;
        }

        /* PART HEADING */
        .part-heading {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 32px 0 16px 0;
        }

        .part-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: bold;
            white-space: nowrap;
        }

        .part-badge.hook {
            background-color: #e8f5f3;
            color: #1A6B6B;
        }

        .part-badge.lab {
            background-color: #fce8e4;
            color: #c0392b;
        }

        .part-badge.digital {
            background-color: #fdf3e0;
            color: #b8860b;
        }

        .part-badge.wrap {
            background-color: #f3e8ed;
            color: #7A2D4E;
        }

        .part-heading h2 {
            font-size: 1.1rem;
            font-weight: bold;
            color: #1A6B6B;
            margin: 0;
        }

        /* SECTION CARD */
        .section-card {
            background-color: #fff;
            border-radius: 14px;
            padding: 24px 26px;
            margin-bottom: 16px;
            border-left: 4px solid;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
        }

        .section-card:hover {
            box-shadow: 0 3px 14px rgba(0,0,0,0.1);
        }

        .section-card.hook {
            border-left-color: #2A9D8F;
        }

        .section-card.lab {
            border-left-color: #E65C3C;
        }

        .section-card.digital {
            border-left-color: #D4A843;
        }

        .section-card.wrap {
            border-left-color: #7A2D4E;
        }

        .section-card p {
            font-size: 0.92rem;
            color: #444;
            line-height: 1.7;
            margin-bottom: 12px;
        }

        .section-card p:last-child {
            margin-bottom: 0;
        }

        /* CALLOUT BOX */
        .callout {
            background-color: #f8fafa;
            border-left: 4px solid #2A9D8F;
            border-radius: 10px;
            padding: 16px;
            margin: 16px 0;
        }

        .callout-label {
            font-size: 0.92rem;
            font-weight: bold;
            color: #1A6B6B;
            margin-bottom: 8px;
            display: block;
        }

        .callout p {
            font-size: 0.9rem;
            color: #444;
            margin: 0;
            line-height: 1.7;
        }

        /* NOTEBOOK CALLOUT (Mini Med standard — lavender) */
        .callout-notebook {
            background-color: #f3eeff;
            border-left: 4px solid #8b5cf6;
            border-radius: 10px;
            padding: 14px 16px;
            margin: 16px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .callout-notebook svg {
            flex-shrink: 0;
            margin-top: 2px;
            color: #6d28d9;
        }
        .callout-notebook-text {
            font-size: 0.9rem;
            color: #4c1d95;
            line-height: 1.65;
            margin: 0;
        }
        .callout-notebook-text strong { color: #5b21b6; }

        /* STUDIO EDIT FOOTER */
        .ftr-edit {
            margin-left: auto;
            color: #1A6B6B;
            text-decoration: none;
            font-size: 0.78rem;
            opacity: 0.75;
        }
        .ftr-edit:hover { opacity: 1; }

        /* VIDEO EMBED */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 1px 6px rgba(0,0,0,0.06);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* NUMBERED STEPS */
        .steps-container {
            margin: 20px 0;
        }

        .step {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .step-circle {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.72rem;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-content {
            flex: 1;
            background-color: #fafcfc;
            border: 1px solid #e8f1f0;
            border-radius: 10px;
            padding: 14px 16px;
        }

        .step-title {
            font-size: 0.88rem;
            font-weight: bold;
            color: #1A6B6B;
            margin-bottom: 6px;
        }

        .step-description {
            font-size: 0.85rem;
            color: #555;
            line-height: 1.6;
        }

        /* MATERIALS BOX */
        .materials-box {
            background-color: #f8fafa;
            border: 1px solid #e0ebe9;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .materials-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: #1A6B6B;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            display: block;
        }

        .materials-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .material-item {
            font-size: 0.82rem;
            color: #444;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .material-bullet {
            color: #1A6B6B;
            font-weight: bold;
            flex-shrink: 0;
        }

        /* APP EMBED */
        .app-container {
            margin: 20px 0;
            border: 2px solid #e0ebe9;
            border-radius: 12px;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
            overflow: hidden;
        }

        .app-launch-button {
            width: 100%;
            background: linear-gradient(135deg, #1A6B6B 0%, #2A9D8F 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border-radius: 10px 10px 0 0;
        }

        .app-launch-button:hover {
            box-shadow: 0 3px 14px rgba(26,107,107,0.3);
        }

        .app-launch-button.loaded {
            display: none;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-left: 6px solid white;
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
        }

        .app-iframe {
            width: 100%;
            height: 600px;
            border: none;
            display: none;
        }

        .app-iframe.loaded {
            display: block;
        }

        /* CHECKBOX */
        .checkbox-card {
            background-color: #f8fafa;
            border: 1px solid #e0ebe9;
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-card input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #2A9D8F;
            flex-shrink: 0;
        }

        .checkbox-label {
            font-size: 0.88rem;
            color: #444;
            font-weight: 500;
            cursor: pointer;
            flex: 1;
            margin: 0;
        }

        .checkbox-card input[type="checkbox"]:checked + .checkbox-label {
            color: #1A6B6B;
            font-weight: 600;
        }

        /* FOOTER */
        .footer {
            background-color: #fff;
            border-top: 3px solid #D4A843;
            padding: 18px;
            text-align: center;
            font-size: 0.85rem;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
        }

        .footer-logo {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .footer-text {
            margin: 0;
        }

        .footer-edit {
            margin-left: auto;
        }

        .footer-edit a {
            font-size: 0.65rem;
            color: #1A6B6B;
            border: 1px dashed #1A6B6B;
            padding: 4px 8px;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .footer-edit a:hover {
            background-color: #f0f5f5;
        }

        /* RESPONSIVE */
        @media (max-width: 1100px) {
            .sidebar {
                width: 210px;
            }

            .main-container {
                width: calc(100% - 210px);
                margin-left: 210px;
            }

            .section-card {
                padding: 18px 20px;
            }
        }

        @media (max-width: 900px) {
            .hamburger {
                display: block;
            }

            .sidebar {
                width: 240px;
                left: -240px;
                transition: left 0.3s ease;
                z-index: 1100;
            }

            .sidebar.open {
                left: 0;
            }

            .main-container {
                width: 100%;
                margin-left: 0;
                padding: 20px 16px;
            }

            .day-header {
                padding: 20px 16px;
                margin-bottom: 16px;
            }

            .day-header h1 {
                font-size: 1.4rem;
            }

            .section-card {
                padding: 16px;
            }

            .materials-grid {
                grid-template-columns: 1fr;
            }

            .app-iframe {
                height: 500px;
            }
        }

        @media (max-width: 640px) {
            .main-container {
                padding: 16px 12px;
            }

            .day-header {
                padding: 16px 12px;
            }

            .day-header h1 {
                font-size: 1.2rem;
            }

            .day-header-subtitle {
                font-size: 0.85rem;
            }

            .section-card {
                padding: 12px;
            }

            .part-heading {
                margin: 24px 0 12px 0;
            }

            .step {
                gap: 12px;
            }

            .app-iframe {
                height: 400px;
            }
        }

        /* OVERLAY FOR MOBILE MENU */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 1050;
        }

        .overlay.open {
            display: block;
        }
    </style>
</head>
<body>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="overlay" id="overlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-content">
                <svg class="sidebar-logo" viewBox="0 0 40 40"><polygon points="13,2 24,13 13,24 2,13" fill="#0ABAB5" opacity="0.85"/><polygon points="27,2 38,13 27,24 16,13" fill="#F5B731" opacity="0.85"/><polygon points="13,16 24,27 13,38 2,27" fill="#E65C3C" opacity="0.85"/><polygon points="27,16 38,27 27,38 16,27" fill="#7A2D4E" opacity="0.85"/></svg>
                <div class="sidebar-title">Chabot STEM 2026</div>
            </div>
            <div class="sidebar-meta">High School | June 22 - July 2</div>
        </div>

        <div class="sidebar-nav" id="sidebar-nav"></div>

        <div class="sidebar-bottom">
            <a href="#" class="edit-link">Edit Workshop Content</a>
        </div>
    </nav>

    <main class="main-container" id="main-container"></main>

    <script>

                    <h2>How Fingerprints Form</h2>
                    <p>
                        Fingerprints are unique patterns of ridges on the fingertips. These patterns begin to form
                        during fetal development, around 10-12 weeks of pregnancy. The ridges develop on the dermis
                        (inner layer of skin) through a process that involves the growth of papillae (small bumps).
                    </p>
                    <h3>Dermal Papillae</h3>
                    <p>
                        The friction ridges we see on our fingertips are created by layers of dermal papillae. These
                        are tiny structures that form the characteristic patterns. The pattern depends on pressure and
                        fluid dynamics in the womb during development.
                    </p>
                    <div class="info-box">
                        <strong>Key Fact:</strong> The ridges form before your fingerprints are fully visible!
                        They develop through a combination of cell growth and natural randomness in the womb.
                    </div>
                </div>

                <div class="section">
                    <h2>Why Fingerprints Are Unique</h2>
                    <p>
                        Every person's fingerprints are unique, even identical twins have different fingerprints.
                        This is because fingerprint formation involves random processes during fetal development.
                        The exact positioning of dermal papillae creates individual variation.
                    </p>
                    <h3>Probability of Duplication</h3>
                    <p>
                        The chances of two people having identical fingerprints are estimated at less than 1 in
                        64 billion! This uniqueness makes fingerprints incredibly valuable for identification in
                        forensic science.
                    </p>
                    <div class="fun-fact">
                        Even the fingerprints on your left and right hands are different!
                    </div>
                </div>

                <div class="section">
                    <h2>History of Fingerprinting in Forensics</h2>
                    <h3>Early Recognition (1858-1900)</h3>
                    <p>
                        In 1858, Sir William Herschel used fingerprints on a contract in India, noting their
                        permanence. By 1880, Dr. Henry Faulds published the first scientific paper proposing
                        fingerprints for criminal identification.
                    </p>
                    <h3>The Henry Classification System (1901)</h3>
                    <p>
                        Sir Edward Henry developed a classification system that organized fingerprints by their
                        patterns. This system made it possible to search through thousands of fingerprint records
                        efficiently. The Henry Classification System is still used today in modified forms.
                    </p>
                    <div class="info-box">
                        <strong>Timeline:</strong>
                        <ul style="margin-top: 10px;">
                            <li>1858 - Herschel notes fingerprint permanence</li>
                            <li>1880 - First scientific proposal for criminal ID</li>
                            <li>1901 - Henry Classification System adopted</li>
                            <li>1924 - FBI establishes fingerprint database</li>
                            <li>1980s+ - Digital fingerprint scanning and AFIS</li>
                        </ul>
                    </div>
                </div>

                <div class="section">
                    <h2>Modern Fingerprint Technology</h2>
                    <h3>AFIS (Automated Fingerprint Identification System)</h3>
                    <p>
                        AFIS is a computer system that stores millions of fingerprints digitally. When a fingerprint
                        is submitted, the system automatically compares it against the database and returns potential
                        matches. Modern AFIS can search through millions of fingerprints in seconds.
                    </p>
                    <h3>Latent Print Development</h3>
                    <p>
                        When a person touches a surface, they leave invisible fingerprints called latent prints.
                        Forensic scientists use special techniques to make these visible:
                    </p>
                    <ul>
                        <li><strong>Powder dusting:</strong> Fine powder adheres to the oils in fingerprints</li>
                        <li><strong>Chemical treatment:</strong> Chemicals like ninhydrin react with sweat residues</li>
                        <li><strong>Cyanoacrylate fuming:</strong> Superglue fumes stick to latent prints</li>
                        <li><strong>Alternate light sources:</strong> Special cameras detect fluorescence</li>
                    </ul>
                    <div class="fun-fact">
                        A single fingerprint can contain 70-100 distinct ridge characteristics that forensic
                        experts can use for identification!
                    </div>
                </div>

                        <li>The FBI's fingerprint database contains over 100 million records</li>
                        <li>Fingerprints are found at about 50% of crime scenes</li>
                        <li>A fingerprint must have at least 8-12 matching points to be considered a match in most jurisdictions</li>
                        <li>Even identical twins have different fingerprints - no two are exactly alike in nature</li>
                        <li>Some animals have fingerprint-like patterns: koalas have unique fingerprints too!</li>
                    </ul>
                </div>

        const patternNames = ['Loop', 'Whorl', 'Arch'];

        // ========== SVG FINGERPRINT GENERATION ==========
        function generateLoopFingerprint() {
            const ridges = [];
            for (let i = 0; i < 8; i++) {
                const startX = 50 + i * 3;
                const controlY = 50 + (Math.random() * 40);
                const path = \`M \${startX} 240 Q \${startX + 20} \${controlY}, \${startX + 10} 50\`;
                ridges.push(path);
            }
            return ridges;
        }

        function generateWhorlFingerprint() {
            const ridges = [];
            for (let radius = 60; radius > 15; radius -= 6) {
                const path = \`M \${100 + radius} 125 A \${radius} \${radius} 0 1 0 \${100 - radius} 125 A \${radius} \${radius} 0 1 0 \${100 + radius} 125\`;
                ridges.push(path);
            }
            return ridges;
        }

        function generateArchFingerprint() {
            const ridges = [];
            for (let i = 0; i < 8; i++) {
                const yPos = 50 + i * 20;
                const xOffset = 30 + (i % 2) * 10;
                const path = \`M 30 \${yPos} Q 100 \${yOffset - 50}, 170 \${yPos}\`;
                ridges.push(path);
            }
            return ridges;
        }

        function drawFingerprint(type) {
            const canvas = document.getElementById('fingerprintCanvas');
            canvas.innerHTML = ''; // Clear previous

            // Background
            const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            bg.setAttribute('width', '200');
            bg.setAttribute('height', '250');
            bg.setAttribute('fill', '#f5f7fa');
            canvas.appendChild(bg);

            let ridges = [];

            if (type === 0) {
                // Loop pattern
                for (let i = 0; i < 10; i++) {
                    const x = 50 + i * 10;
                    const curveX = x + 15 + Math.random() * 10;
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', \`M \${x} 240 Q \${curveX} 80, \${x - 5} 40\`);
                    path.setAttribute('stroke', i % 2 === 0 ? '#1A6B6B' : '#2A9D8F');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke-linecap', 'round');
                    canvas.appendChild(path);
                }
            } else if (type === 1) {
                // Whorl pattern
                for (let radius = 70; radius > 15; radius -= 8) {
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    path.setAttribute('cx', '100');
                    path.setAttribute('cy', '125');
                    path.setAttribute('r', radius);
                    path.setAttribute('stroke', radius % 16 === 0 ? '#1A6B6B' : '#2A9D8F');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('fill', 'none');
                    canvas.appendChild(path);
                }
            } else if (type === 2) {
                // Arch pattern
                for (let i = 0; i < 10; i++) {
                    const yPos = 40 + i * 18;
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', \`M 20 \${yPos} Q 100 \${yPos - 40}, 180 \${yPos}\`);
                    path.setAttribute('stroke', i % 2 === 0 ? '#1A6B6B' : '#2A9D8F');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('fill', 'none');
                    path.setAttribute('stroke-linecap', 'round');
                    canvas.appendChild(path);
                }
            }
        }

    <script>
        // State management
        let appState = {
            currentTab: 'calculator',
            practiceRound: {
                challenges: [],

                totalScore: 0,

            }
        };

        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            appState.currentTab = tabName;

            if (tabName === 'practice' && appState.practiceRound.challenges.length === 0) {
                startPractice();
            }
        }

        // Calculator Functions
        function calculateAngle() {
            const width = parseFloat(document.getElementById('width').value);
            const length = parseFloat(document.getElementById('length').value);
            const errorMsg = document.getElementById('errorMessage');
            const resultDisplay = document.getElementById('resultDisplay');

            errorMsg.classList.remove('show');
            resultDisplay.classList.remove('show');

            // Validation
            if (!width || !length) {
                showError('Please enter both width and length values.');
                return;
            }

            if (width <= 0 || length <= 0) {
                showError('Width and length must be positive numbers.');
                return;
            }

            if (width > length) {
                showError('Width cannot be greater than length. (Width must be ≤ Length)');
                return;
            }

            // Calculate angle
            const sinAngle = width / length;

            if (sinAngle > 1) {
                showError('Invalid measurements: width/length ratio cannot exceed 1.');
                return;
            }

            const angleRadians = Math.asin(sinAngle);
            const angleDegrees = angleRadians * (180 / Math.PI);

            // Display results
            document.getElementById('angleResult').textContent = angleDegrees.toFixed(1) + '°';

            // Update formula steps with actual values
            document.getElementById('formula-step1').textContent =
                \`Step 1: sin(θ) = \${width.toFixed(2)} ÷ \${length.toFixed(2)} = \${sinAngle.toFixed(4)}\`;
            document.getElementById('formula-step2').textContent =
                \`Step 2: sin(θ) = \${sinAngle.toFixed(4)}\`;
            document.getElementById('formula-step3').textContent =
                \`Step 3: θ = arcsin(\${sinAngle.toFixed(4)}) = \${angleRadians.toFixed(4)} radians\`;
            document.getElementById('formula-step4').textContent =
                \`Step 4: θ = \${angleRadians.toFixed(4)} × (180/π) = \${angleDegrees.toFixed(1)}°\`;

            resultDisplay.classList.add('show');

            // Draw diagram
            drawDiagram(width, length, angleDegrees);

            // Draw animation
            drawAnimation(angleDegrees, width, length);
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        }

        function resetCalculator() {
            document.getElementById('width').value = '';
            document.getElementById('length').value = '';
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('resultDisplay').classList.remove('show');

            const ctx = document.getElementById('diagramCanvas').getContext('2d');
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);

            const animCtx = document.getElementById('animationCanvas').getContext('2d');
            animCtx.clearRect(0, 0, animCtx.canvas.width, animCtx.canvas.height);
        }

        function drawDiagram(width, length, angle) {
            const canvas = document.getElementById('diagramCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = 80;

            // Draw grid
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Scale to fit
            const scale = maxRadius / Math.max(width, length);
            const scaledWidth = width * scale;
            const scaledLength = length * scale;

            // Draw ellipse
            ctx.fillStyle = 'rgba(42, 157, 143, 0.3)';
            ctx.strokeStyle = '#2A9D8F';
            ctx.lineWidth = 3;

            ctx.beginPath();
            ctx.ellipse(centerX, centerY, scaledLength / 2, scaledWidth / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Draw width line
            ctx.strokeStyle = '#D4A843';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - scaledWidth / 2);
            ctx.lineTo(centerX, centerY + scaledWidth / 2);
            ctx.stroke();

            // Draw length line
            ctx.strokeStyle = '#1B3A5C';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(centerX - scaledLength / 2, centerY);
            ctx.lineTo(centerX + scaledLength / 2, centerY);
            ctx.stroke();

            // Draw labels
            ctx.fillStyle = '#D4A843';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'right';
            ctx.fillText('Width', centerX - 15, centerY);

            ctx.fillStyle = '#1B3A5C';
            ctx.textAlign = 'center';
            ctx.fillText('Length', centerX, centerY + 25);

            // Draw angle indicator
            ctx.strokeStyle = '#2A9D8F';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            const angleRadians = angle * (Math.PI / 180);
            const arcRadius = 40;
            ctx.beginPath();
            ctx.arc(centerX, centerY, arcRadius, -Math.PI / 2, -Math.PI / 2 + angleRadians, false);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#2A9D8F';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(angle.toFixed(1) + '°', centerX - 10, centerY - arcRadius - 20);
        }

        function drawAnimation(angle, width, length) {
            const canvas = document.getElementById('animationCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const angleRad = angle * (Math.PI / 180);
            const dropStartX = canvas.width / 2;
            const dropStartY = 50;
            const surfaceY = 220;

            // Draw arrow showing impact direction
            ctx.strokeStyle = '#D4A843';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(dropStartX, dropStartY);
            ctx.lineTo(dropStartX + Math.sin(angleRad) * 80, dropStartY + Math.cos(angleRad) * 80);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw blood drop (circle that will become ellipse)
            ctx.fillStyle = 'rgba(204, 41, 54, 0.8)';
            ctx.beginPath();
            ctx.arc(dropStartX, dropStartY, 8, 0, Math.PI * 2);
            ctx.fill();

            // Draw surface
            ctx.strokeStyle = '#1B3A5C';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, surfaceY);
            ctx.lineTo(canvas.width, surfaceY);
            ctx.stroke();

            // Draw resulting spatter
            const splatStartX = dropStartX + Math.sin(angleRad) * 120;
            const splatScale = 0.6;
            const splatWidth = 40 * (Math.sin(angleRad) / Math.sin(Math.PI / 2)) * splatScale;
            const splatLength = 60 * splatScale;

            ctx.fillStyle = 'rgba(204, 41, 54, 0.6)';
            ctx.beginPath();
            ctx.ellipse(splatStartX, surfaceY, splatLength / 2, splatWidth / 2, angleRad, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#cc2936';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(splatStartX, surfaceY, splatLength / 2, splatWidth / 2, angleRad, 0, Math.PI * 2);
            ctx.stroke();

            // Add angle label
            ctx.fillStyle = '#1A6B6B';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(\`Impact Angle: \${angle.toFixed(1)}°\`, canvas.width / 2, 30);
        }

        // Practice Challenge Functions
        function startPractice() {
            appState.practiceRound = {
                challenges: generateChallenges(5),
                currentChallenge: 0,
                totalScore: 0,
                answers: []
            };

            showChallenge();
        }

        function generateChallenges(count) {
            const challenges = [];
            for (let i = 0; i < count; i++) {
                // Generate angles with varying difficulty
                let angle;
                if (i < 2) {
                    // Easy: 60-90 degrees (width/length between 0.87-1)
                    angle = 60 + Math.random() * 30;
                } else if (i < 4) {
                    // Medium: 30-60 degrees (width/length between 0.5-0.87)
                    angle = 30 + Math.random() * 30;
                } else {
                    // Hard: 10-30 degrees (width/length between 0.17-0.5)
                    angle = 10 + Math.random() * 20;
                }

                const length = 60 + Math.random() * 20;
                const width = length * Math.sin(angle * Math.PI / 180);
                const noise = (Math.random() - 0.5) * 2; // -1 to 1 mm noise

                challenges.push({
                    angle: angle,
                    length: length + noise,
                    width: width + noise,
                    displayLength: length + noise,
                    displayWidth: width + noise
                });
            }
            return challenges;
        }

        function showChallenge() {
            const challenge = appState.practiceRound.challenges[appState.practiceRound.currentChallenge];

            document.getElementById('challengeNumber').textContent =
                \`Challenge \${appState.practiceRound.currentChallenge + 1} of 5\`;
            document.getElementById('practiceWidth').value = '';
            document.getElementById('practiceLength').value = '';
            document.getElementById('challengeFeedback').classList.remove('show');

            drawPracticeSpatter(challenge);
        }

        function drawPracticeSpatter(challenge) {
            const canvas = document.getElementById('practiceCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background grid
            ctx.strokeStyle = '#d0d0d0';
            ctx.lineWidth = 1;
            const gridSize = 20;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw ruler marks
            ctx.fillStyle = '#666666';
            ctx.font = '12px Arial';
            ctx.textAlign = 'right';
            for (let i = 10; i <= 90; i += 10) {
                ctx.fillText(i + 'mm', canvas.width - 5, i + 5);
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const scale = 1; // 1 pixel = 1 mm for measurement

            // Draw blood spatter ellipse
            ctx.fillStyle = 'rgba(204, 41, 54, 0.5)';
            ctx.strokeStyle = '#cc2936';
            ctx.lineWidth = 2;

            const scaledWidth = challenge.displayWidth * scale;
            const scaledLength = challenge.displayLength * scale;

            ctx.beginPath();
            ctx.ellipse(centerX, centerY, scaledLength / 2, scaledWidth / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // Draw measurement guides (dashed lines)
            ctx.strokeStyle = '#2A9D8F';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 3]);

            // Width guide
            ctx.beginPath();
            ctx.moveTo(centerX - 5, centerY - scaledWidth / 2);
            ctx.lineTo(centerX - 5, centerY + scaledWidth / 2);
            ctx.stroke();

            // Length guide
            ctx.beginPath();
            ctx.moveTo(centerX - scaledLength / 2, centerY + 5);
            ctx.lineTo(centerX + scaledLength / 2, centerY + 5);
            ctx.stroke();
            ctx.setLineDash([]);

            // Add hint text
            ctx.fillStyle = '#1B3A5C';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Use the grid to measure the ellipse', centerX, 20);
        }

        function submitChallenge() {
            const practiceWidth = parseFloat(document.getElementById('practiceWidth').value);
            const practiceLength = parseFloat(document.getElementById('practiceLength').value);
            const feedback = document.getElementById('challengeFeedback');
            const challenge = appState.practiceRound.challenges[appState.practiceRound.currentChallenge];

            feedback.classList.remove('show', 'correct', 'incorrect');

            if (!practiceWidth || !practiceLength) {
                feedback.textContent = 'Please enter both width and length values.';
                feedback.classList.add('show', 'incorrect');
                return;
            }

            if (practiceWidth > practiceLength) {
                feedback.textContent = 'Width cannot be greater than length.';
                feedback.classList.add('show', 'incorrect');
                return;
            }

            // Calculate student's angle
            const sinAngle = practiceWidth / practiceLength;
            if (sinAngle > 1) {
                feedback.textContent = 'Invalid measurements.';
                feedback.classList.add('show', 'incorrect');
                return;
            }

            const studentAngle = Math.asin(sinAngle) * (180 / Math.PI);
            const difference = Math.abs(studentAngle - challenge.angle);

            let stars = 0;
            let feedbackText = '';

            if (difference <= 2) {
                stars = 3;
                feedbackText = \`Excellent! Your answer of \${studentAngle.toFixed(1)}° is very close to the actual angle of \${challenge.angle.toFixed(1)}°. (Difference: \${difference.toFixed(1)}°) ⭐⭐⭐\`;
                feedback.classList.add('correct');
            } else if (difference <= 5) {
                stars = 2;
                feedbackText = \`Good job! Your answer of \${studentAngle.toFixed(1)}° is close to the actual angle of \${challenge.angle.toFixed(1)}°. (Difference: \${difference.toFixed(1)}°) ⭐⭐\`;
                feedback.classList.add('correct');
            } else if (difference <= 10) {
                stars = 1;
                feedbackText = \`Not bad! Your answer of \${studentAngle.toFixed(1)}° was \${difference.toFixed(1)}° off from the actual angle of \${challenge.angle.toFixed(1)}°. Try to measure more carefully. ⭐\`;
                feedback.classList.add('incorrect');
            } else {
                stars = 0;
                feedbackText = \`Your answer of \${studentAngle.toFixed(1)}° is quite different from the actual angle of \${challenge.angle.toFixed(1)}°. Remember: width must be ≤ length!\`;
                feedback.classList.add('incorrect');
            }

            appState.practiceRound.totalScore += stars;
            appState.practiceRound.answers.push({
                challenge: challenge.angle,
                studentAnswer: studentAngle,
                stars: stars,
                difference: difference
            });

            feedback.innerHTML = \`<strong>\${feedbackText}</strong>\`;
            feedback.classList.add('show');

            document.getElementById('currentScore').textContent = appState.practiceRound.totalScore;

            setTimeout(() => {
                if (appState.practiceRound.currentChallenge < 4) {
                    appState.practiceRound.currentChallenge++;
                    showChallenge();
                } else {
                    showResults();
                }
            }, 2500);
        }

        function showResults() {

            resultsSummary.classList.add('show');

            const starString = '⭐'.repeat(totalStars) + '☆'.repeat(15 - totalStars);
            document.getElementById('totalStars').textContent = starString;

            } else if (totalStars >= 9) {
                resultsText += ' Great work! You have a talent for measurement!';
            } else if (totalStars >= 6) {
                resultsText += ' Good effort! Practice makes perfect!';
            } else {
                resultsText += ' Keep practicing! You are learning the fundamentals!';
            }

            document.getElementById('resultsText').textContent = resultsText;
        }

        // Initialize

                        } else {

                        }
                    }
                });
            });
        });
    <\/script>
</body>

                <div class="learn-content">
                    <div class="learn-section">
                        <h3>How the Heart's Electrical System Works</h3>
                        <p>Your heart beats due to a carefully orchestrated electrical system that creates and conducts electrical signals:</p>
                        <ul>
                            <li><span class="highlight">SA Node (Sinoatrial):</span> The heart's natural pacemaker. Generates electrical impulses at the rate of 60-100 times per minute.</li>
                            <li><span class="highlight">AV Node (Atrioventricular):</span> Acts as a gatekeeper, slowing the signal to allow the atria to contract before the ventricles.</li>
                            <li><span class="highlight">Bundle of His:</span> Carries the signal from the AV node toward the ventricles.</li>
                            <li><span class="highlight">Purkinje Fibers:</span> Distribute the electrical signal throughout the ventricular walls, causing them to contract in a coordinated wave.</li>
                        </ul>
                    </div>

                    <div class="learn-section">
                        <h3>Understanding PQRST Waves</h3>
                        <p>Each heartbeat produces a distinctive pattern on an EKG that tells us what's happening electrically:</p>
                        <ul>
                            <li><span class="highlight">P Wave:</span> Represents atrial depolarization (the atria contracting). It's the first small bump you see.</li>
                            <li><span class="highlight">QRS Complex:</span> The big spike! Shows ventricular depolarization (ventricles contracting). This is the largest wave because the ventricles are thick and powerful.</li>
                            <li><span class="highlight">T Wave:</span> The ventricular repolarization (ventricles relaxing and recovering). Usually smaller than the QRS complex.</li>
                            <li><span class="highlight">ST Segment:</span> The flat line between the QRS complex and T wave. Should be at the baseline (no elevation or depression).</li>
                        </ul>
                    </div>

                    <div class="learn-section">
                        <h3>Common Arrhythmias & Their Causes</h3>
                        <ul>
                            <li><span class="highlight">Sinus Tachycardia:</span> Abnormally fast heart rate (>100 BPM). Causes: fever, anxiety, exercise, caffeine, hyperthyroidism.</li>
                            <li><span class="highlight">Sinus Bradycardia:</span> Abnormally slow heart rate (<60 BPM). Causes: athletic conditioning, hypothyroidism, certain medications, heart disease.</li>
                            <li><span class="highlight">Atrial Fibrillation (AFib):</span> Chaotic, irregular heartbeat. The atria quiver instead of contracting normally. Increases stroke risk.</li>
                            <li><span class="highlight">ST-Elevation (STEMI):</span> Dangerous pattern indicating acute myocardial infarction (heart attack). The ST segment is elevated, showing blocked blood flow to the heart muscle.</li>
                        </ul>
                    </div>

                    <div class="learn-section">
                        <h3>EKGs in Clinical Practice</h3>
                        <p>EKGs are essential tools that help doctors:</p>
                        <ul>
                            <li>Diagnose heart attacks (MI) by looking for elevated ST segments or T wave inversions</li>
                            <li>Detect abnormal heart rhythms (arrhythmias) like AFib or dangerous patterns</li>
                            <li>Assess heart rate and rhythm in patients with chest pain, shortness of breath, or dizziness</li>
                            <li>Monitor heart health before surgery or in patients taking heart medications</li>
                            <li>Evaluate electrolyte imbalances that affect the electrical system</li>
                        </ul>
                    </div>

                    <div class="learn-section">
                        <h3>🎯 Career Connections</h3>
                        <div class="career-box">
                            <strong>Cardiologist:</strong> A physician specializing in diagnosis and treatment of heart disease. Requires medical school (4 years) plus cardiology fellowship (3+ years).
                        </div>
                        <div class="career-box">
                            <strong>Cardiac Technician / EKG Technician:</strong> Performs EKGs and other cardiac tests. Typically requires certification through coursework and exam.
                        </div>
                        <div class="career-box">
                            <strong>Paramedic/EMT:</strong> Uses EKGs in emergency response to rapidly diagnose cardiac emergencies. Provides immediate care before hospital arrival.
                        </div>
                        <div class="career-box">
                            <strong>Cardiac Nurse:</strong> Provides specialized nursing care to heart patients in hospitals and clinics. Requires RN degree and additional certification.
                        </div>
                        <div class="career-box">
                            <strong>Interventional Cardiologist:</strong> Performs procedures like angioplasty and stent placement. Combines cardiology with catheterization expertise.
                        </div>
                    </div>

    <script>
        // ============================================
        // GLOBAL STATE & CONFIGURATION
        // ============================================
        const state = {
            currentRhythm: 'nsr',
            currentTab: 'explorer',
            animationOffset: 0,
            speed: 1,
            amplitude: 1,
            bpm: 72,
            legendVisible: false,
            quizState: {
                currentQuestion: 0,
                score: 0,
                answered: false,
                showResults: false,
                questions: []
            }
        };

        const rhythmInfo = {
            nsr: {
                name: 'Normal Sinus Rhythm (NSR)',
                bpm: 72,
                description: 'The normal heart rhythm with regular P, QRS, and T waves. A healthy baseline for comparison.'
            },
            tachycardia: {
                name: 'Sinus Tachycardia',
                bpm: 120,
                description: 'Abnormally fast heart rate (>100 BPM). The heart is beating faster than normal, possibly due to exercise, fever, anxiety, or caffeine.'
            },
            bradycardia: {
                name: 'Sinus Bradycardia',
                bpm: 45,
                description: 'Abnormally slow heart rate (<60 BPM). Common in athletes, but can also indicate hypothyroidism or heart block.'
            },
            afib: {
                name: 'Atrial Fibrillation (AFib)',
                bpm: 100,
                description: 'Chaotic, irregular heartbeat with no clear P waves. The atria quiver instead of contracting normally. Increases risk of blood clots and stroke.'
            },
            stemi: {
                name: 'ST-Elevation (STEMI Pattern)',
                bpm: 85,
                description: 'Dangerous pattern indicating a heart attack. The ST segment is elevated above the baseline, showing blocked blood flow to the heart muscle.'
            }
        };

        // ============================================
        // WAVEFORM DRAWING FUNCTIONS
        // ============================================
        function drawEKGWaveform(canvas, rhythm, offset, speed, amplitude, isQuiz = false) {
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const centerY = height / 2;

            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, width, height);

            // Draw grid
            ctx.strokeStyle = '#1a4d4d';
            ctx.lineWidth = 1;
            const gridSpacing = 20;
            for (let x = 0; x < width; x += gridSpacing) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSpacing) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Draw waveform
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.beginPath();

            const beatLength = 200 / speed;
            const points = [];

            for (let x = 0; x < width; x += 1) {
                const normalizedX = ((x + offset) % beatLength) / beatLength;
                let y = 0;

                if (rhythm === 'nsr') {
                    y = drawNormalWave(normalizedX, centerY, amplitude);
                } else if (rhythm === 'tachycardia') {
                    y = drawNormalWave(normalizedX, centerY, amplitude);
                } else if (rhythm === 'bradycardia') {
                    y = drawNormalWave(normalizedX, centerY, amplitude);
                } else if (rhythm === 'afib') {
                    y = drawAFibWave(normalizedX, centerY, amplitude, x);
                } else if (rhythm === 'stemi') {
                    y = drawSTEMIWave(normalizedX, centerY, amplitude);
                }

                if (x === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();
        }

        function drawNormalWave(t, centerY, amplitude) {
            // P wave
            if (t < 0.08) {
                const pt = t / 0.08;
                return centerY - Math.sin(pt * Math.PI) * 8 * amplitude;
            }
            // PR segment
            if (t < 0.18) return centerY;
            // Q wave
            if (t < 0.20) {
                const qt = (t - 0.18) / 0.02;
                return centerY + Math.sin(qt * Math.PI) * 5 * amplitude;
            }
            // R wave
            if (t < 0.25) {
                const rt = (t - 0.20) / 0.05;
                return centerY - Math.sin(rt * Math.PI) * 35 * amplitude;
            }
            // S wave
            if (t < 0.30) {
                const st = (t - 0.25) / 0.05;
                return centerY + Math.sin(st * Math.PI) * 15 * amplitude;
            }
            // ST segment
            if (t < 0.38) return centerY;
            // T wave
            if (t < 0.50) {
                const tt = (t - 0.38) / 0.12;
                return centerY - Math.sin(tt * Math.PI) * 12 * amplitude;
            }
            // Return to baseline
            return centerY;
        }

        function drawAFibWave(t, centerY, amplitude, xPixel) {
            // Irregular baseline with fibrillatory waves
            const fibrillation = Math.sin(xPixel * 0.1 + t * 5) * 3 * amplitude;

            if (t < 0.5) {
                // Irregular R waves at random intervals
                const rndComponent = Math.sin(xPixel * 0.05) * 0.3;
                if ((t + rndComponent + 0.5) % 0.35 < 0.08) {
                    const rt = ((t + rndComponent) % 0.35) / 0.08;
                    return centerY - Math.sin(rt * Math.PI) * 25 * amplitude + fibrillation;
                }
            }
            return centerY + fibrillation;
        }

        function drawSTEMIWave(t, centerY, amplitude) {
            // P wave
            if (t < 0.08) {
                const pt = t / 0.08;
                return centerY - Math.sin(pt * Math.PI) * 8 * amplitude;
            }
            // PR segment
            if (t < 0.18) return centerY;
            // Q wave
            if (t < 0.20) {
                const qt = (t - 0.18) / 0.02;
                return centerY + Math.sin(qt * Math.PI) * 5 * amplitude;
            }
            // R wave
            if (t < 0.25) {
                const rt = (t - 0.20) / 0.05;
                return centerY - Math.sin(rt * Math.PI) * 35 * amplitude;
            }
            // S wave
            if (t < 0.30) {
                const st = (t - 0.25) / 0.05;
                return centerY + Math.sin(st * Math.PI) * 15 * amplitude;
            }
            // ELEVATED ST SEGMENT (CRITICAL!)
            if (t < 0.38) return centerY - 12 * amplitude;
            // T wave
            if (t < 0.50) {
                const tt = (t - 0.38) / 0.12;
                return centerY - Math.sin(tt * Math.PI) * 12 * amplitude - 12 * amplitude;
            }
            // Return to baseline
            return centerY;
        }

        // ============================================
        // TAB MANAGEMENT
        // ============================================
        document.querySelectorAll('.tab-button').forEach(button => {
            button.addEventListener('click', (e) => {
                const tabName = e.target.dataset.tab;
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            state.currentTab = tabName;

            // Update button states
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // Update content visibility
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');

            // Handle tab-specific initialization
            if (tabName === 'explorer') {
                startExplorerAnimation();
            } else if (tabName === 'quiz') {
                initializeQuiz();
            }
        }

        // ============================================
        // EXPLORER TAB
        // ============================================
        document.querySelectorAll('.rhythm-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.rhythm-btn').forEach(b => b.classList.remove('active'));
                e.target.closest('.rhythm-btn').classList.add('active');

                state.currentRhythm = e.target.closest('.rhythm-btn').dataset.rhythm;
                updateRhythmInfo();
                state.animationOffset = 0;
            });
        });

        function updateRhythmInfo() {
            const info = rhythmInfo[state.currentRhythm];
            state.bpm = info.bpm;
            document.getElementById('bpmValue').textContent = info.bpm;
            document.getElementById('rhythmInfo').innerHTML =
                \`<strong>\${info.name}</strong><br>\${info.description}\`;
        }

        document.getElementById('legendToggle').addEventListener('click', () => {
            state.legendVisible = !state.legendVisible;
            document.getElementById('legendBox').classList.toggle('active');
            document.getElementById('legendToggle').textContent =
                state.legendVisible ? 'Hide Wave Labels' : 'Show Wave Labels';
        });

        document.getElementById('speedControl').addEventListener('change', (e) => {
            state.speed = parseFloat(e.target.value);
        });

        document.getElementById('amplitudeControl').addEventListener('change', (e) => {
            state.amplitude = parseFloat(e.target.value);
        });

        function startExplorerAnimation() {
            const canvas = document.getElementById('explorerCanvas');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight || 250;

            function animate() {
                if (state.currentTab === 'explorer') {
                    drawEKGWaveform(canvas, state.currentRhythm, state.animationOffset, state.speed, state.amplitude);
                    state.animationOffset += 2 * state.speed;
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }

        // ============================================
        // QUIZ TAB
        // ============================================
        const quizQuestions = [
            { rhythm: 'nsr', options: ['Normal Sinus Rhythm', 'Sinus Tachycardia', 'Atrial Fibrillation', 'ST-Elevation'], correct: 0 },
            { rhythm: 'tachycardia', options: ['Sinus Bradycardia', 'Sinus Tachycardia', 'Normal Sinus Rhythm', 'Atrial Fibrillation'], correct: 1 },
            { rhythm: 'bradycardia', options: ['Atrial Fibrillation', 'Normal Sinus Rhythm', 'Sinus Bradycardia', 'ST-Elevation'], correct: 2 },
            { rhythm: 'afib', options: ['Normal Sinus Rhythm', 'Atrial Fibrillation', 'Sinus Tachycardia', 'ST-Elevation'], correct: 1 },
            { rhythm: 'stemi', options: ['Sinus Bradycardia', 'ST-Elevation (STEMI)', 'Normal Sinus Rhythm', 'Atrial Fibrillation'], correct: 1 },
            { rhythm: 'nsr', options: ['Atrial Fibrillation', 'Normal Sinus Rhythm', 'Sinus Bradycardia', 'Sinus Tachycardia'], correct: 1 },
            { rhythm: 'afib', options: ['Sinus Bradycardia', 'Normal Sinus Rhythm', 'Atrial Fibrillation', 'ST-Elevation'], correct: 2 },
            { rhythm: 'tachycardia', options: ['ST-Elevation', 'Atrial Fibrillation', 'Sinus Tachycardia', 'Normal Sinus Rhythm'], correct: 2 }
        ];

        const explanations = {
            nsr: 'Normal Sinus Rhythm is the typical heart rhythm with regular P, QRS, and T waves at 60-100 BPM.',
            tachycardia: 'Sinus Tachycardia shows a normal pattern but at a faster rate (>100 BPM), often due to exercise, fever, or stress.',
            bradycardia: 'Sinus Bradycardia is a slower than normal rhythm (<60 BPM), common in athletes or with certain medical conditions.',
            afib: 'Atrial Fibrillation shows irregular R-R intervals with no clear P waves. The atria are quivering chaotically.',
            stemi: 'ST-Elevation indicates a heart attack with elevated ST segments, showing blocked blood flow to heart muscle. This is an emergency!'
        };

        function initializeQuiz() {
            if (state.quizState.showResults) return;

            state.quizState = {
                currentQuestion: 0,
                score: 0,
                answered: false,
                showResults: false,
                questions: [...quizQuestions].sort(() => Math.random() - 0.5)
            };

            displayQuizQuestion();

        function displayQuizQuestion() {
            const q = state.quizState.questions[state.quizState.currentQuestion];

            canvas.height = 120;

            // Update progress
            document.getElementById('currentQuestion').textContent = state.quizState.currentQuestion + 1;

            // Clear feedback
            const feedback = document.getElementById('quizFeedback');
            feedback.classList.remove('show', 'correct', 'incorrect');
            feedback.innerHTML = '';

            // Create answer buttons
            const answersDiv = document.getElementById('quizAnswers');
            answersDiv.innerHTML = '';
            state.quizState.answered = false;

            q.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-answer-btn';
                btn.textContent = option;
                btn.disabled = false;

                btn.addEventListener('click', () => {
                    if (state.quizState.answered) return;
                    state.quizState.answered = true;

                    const isCorrect = index === q.correct;
                    btn.classList.add(isCorrect ? 'correct' : 'incorrect');

                    if (isCorrect) {
                        state.quizState.score++;
                    }

                    // Show explanation
                    const feedback = document.getElementById('quizFeedback');
                    feedback.classList.add('show', isCorrect ? 'correct' : 'incorrect');
                    feedback.innerHTML = \`<strong>\${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong><br>\${explanations[q.rhythm]}\`;

                    // Disable all buttons
                    document.querySelectorAll('.quiz-answer-btn').forEach(b => b.disabled = true);

                    // Move to next question after delay
                    setTimeout(() => {
                        state.quizState.currentQuestion++;
                        if (state.quizState.currentQuestion >= state.quizState.questions.length) {
                            showQuizResults();

                        }
                    }, 2000);
                });

                answersDiv.appendChild(btn);
